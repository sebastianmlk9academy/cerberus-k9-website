  - name: instructor_filters
    label: "🎯 Filtry Instruktorów (CMS)"
    label_singular: "Filtr"
    folder: src/content/instructor_filters
    create: true
    delete: true
    slug: "{{slug}}"
    extension: yml
    format: yaml
    fields:
      - { name: key, label: "🔑 Klucz", widget: string, required: true }
      - { name: label_pl, label: "🇵🇱 Etykieta PL", widget: string, required: true }
      - { name: label_en, label: "🇬🇧 Etykieta EN", widget: string, required: false }
      - { name: label_de, label: "🇩🇪 Etykieta DE", widget: string, required: false }
      - { name: label_fr, label: "🇫🇷 Etykieta FR", widget: string, required: false }
      - name: filter_field
        label: "🧩 Pole filtrowania"
        widget: select
        default: specializations
        hint: >
          📍 Gdzie: logika filtrów na stronie /instruktorzy — które pole frontmatteru jest porównywane.
          ✏️ specializations = tagi, type = typ uczestnika, module = moduł, languages = języki, all = dowolne dopasowanie.
        options:
          - { label: "🎯 Specjalizacje", value: specializations }
          - { label: "👤 Typ uczestnika", value: type }
          - { label: "📚 Moduł", value: module }
          - { label: "🗣️ Języki", value: languages }
          - { label: "🌐 Wszystkie pola (all)", value: all }
      - name: filter_match
        label: "⚖️ Sposób dopasowania"
        widget: select
        default: includes
        hint: >
          📍 Gdzie: sposób porównania wartości filtra z danymi instruktora na /instruktorzy.
          ✏️ includes = zawiera, equals = równe, any_of = jedna z listy, none = wykluczenie.
        options:
          - { label: "📎 Zawiera (includes)", value: includes }
          - { label: "✅ Równe (equals)", value: equals }
          - { label: "📋 Dowolna z listy (any_of)", value: any_of }
          - { label: "🚫 Wyklucza (none)", value: none }
      - name: filter_value
        label: "✏️ Wartość (pojedyncza)"
        widget: string
        required: false
        hint: "📍 Gdzie: pojedynczy tekst/kod porównywany przez filtr. ✏️ Np. klucz specjalizacji z CMS."
      - name: filter_values
        label: "📋 Wartości (lista)"
        widget: list
        required: false
        hint: "📍 Gdzie: wiele wartości dla trybu any_of/none na /instruktorzy."
        field:
          name: v
          label: "✏️ Wartość listy"
          widget: string
          hint: "Pojedyncza wartość z listy filtra."
      - name: order
        label: "🔢 Kolejność"
        widget: number
        value_type: int
        default: 10
        hint: "📍 Gdzie: kolejność przycisków filtrów na /instruktorzy — mniejsza = wcześniej."
      - name: active
        label: "👁️ Filtr aktywny"
        widget: boolean
        default: true
        hint: "true = filtr widoczny na stronie, false = ukryty w UI (wpis zostaje w repozytorium)."
