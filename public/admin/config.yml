        name: "title"
        widget: "string"
        required: true
        hint: "📍 Karta szkolenia na stronie /szkolenia."
      - name: "category"
        label: "🏷️ Kategoria"
        widget: "select"
        required: true
        hint: "Używana do filtrowania szkoleń."
        options:
          - { label: "🐕 K9 — Praca z psem", value: "k9" }
          - { label: "🏥 TCCC — Medycyna taktyczna", value: "tccc" }
          - { label: "🚁 Drony / BSP", value: "drony" }
          - { label: "🎯 Taktyka i procedury", value: "taktyka" }
          - { label: "👨‍🏫 Szkolenie przewodników", value: "przewodnicy" }
      - label: "📋 Opis szkolenia"
        name: "description"
        widget: "markdown"
        required: true
        hint: "Pełny opis widoczny na stronie szczegółów."
      - name: "instructor"
        label: "🎖️ Instruktor"
        widget: "relation"
        collection: "instruktorzy"
        search_fields: ["name", "role"]
        value_field: "name"
        display_fields: ["name", "role"]
        required: false
        hint: "Wybierz z listy — zostanie podlinkowany profil instruktora."
      - name: "date_start"
        label: "📅 Data rozpoczęcia"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false
        required: false
        hint: "Zostaw puste jeśli szkolenie jest 'na żądanie'."
      - name: "date_end"
        label: "📅 Data zakończenia"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false
        required: false
      - label: "📍 Miejsce"
        name: "location"
        widget: "string"
        required: false
        hint: "✏️ Ostrów Wielkopolski / Online / Do uzgodnienia"
      - label: "💰 Cena (PLN)"
        name: "price"
        widget: "number"
        value_type: "float"
        min: 0
        default: 0
        required: false
        hint: "Wpisz 0 jeśli bezpłatne lub do uzgodnienia."
      - label: "👥 Limit miejsc"
        name: "places_total"
        widget: "number"
        value_type: "int"
        min: 1
        required: false
        hint: "Zostaw puste jeśli brak limitu."
      - label: "🔗 Link rejestracji"
        name: "registration_url"
        widget: "string"
        required: false
        hint: "URL formularza. Puste = rejestracja przez email."
      - name: "image"
        label: "📸 Zdjęcie szkolenia"
        widget: "image"
        required: false
        choose_url: true
        hint: "⚠️ Format: WebP, 800x450px, max 300KB."
      - label: "⭐ Wyróżnione"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "true = wyróżnione szkolenie wyświetlane jako pierwsze."
      - label: "🔢 Kolejność"
        name: "order"
        widget: "number"
        default: 99
      - label: "👁️ Widoczne"
        name: "active"
        widget: "boolean"
        default: true
        hint: "true = widoczne, false = ukryte bez usuwania."

