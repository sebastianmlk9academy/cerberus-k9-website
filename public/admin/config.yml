  - name: "agenda_categories"
    label: "📅 O Wydarzeniu — Kategorie Agendy"
    description: "Kolory i nazwy filtrów agendy (K9, TCCC, Drony itd.)."
    folder: "src/content/agenda_categories"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: "key"
    summary: "{{label_pl}} — {{key}} ({{order}})"
    fields:
      - name: "key"
        label: "🔑 Klucz kategorii"
        widget: "string"
        hint: "Unikalny klucz — powiązany z polem category w programie."
        required: true
        pattern:
          - "^[A-Z0-9_]+$"
          - "Wielkie litery, cyfry i podkreślniki"
      - name: "label_pl"
        label: "🇵🇱 Etykieta PL"
        widget: "string"
        hint: "Nazwa filtra agendy po polsku."
        required: true
      - name: "label_en"
        label: "🇬🇧 Etykieta EN"
        widget: "string"
        hint: "Nazwa filtra po angielsku."
        required: false
      - name: "color"
        label: "🎨 Kolor (hex)"
        widget: "color"
        hint: "Kolor paska kategorii na osi czasu."
        required: true
        default: "#C4922A"
      - name: "show_in_filter"
        label: "🔘 Pokaż w filtrach"
        widget: "boolean"
        hint: "true = widoczny dla odwiedzających, false = ukryty. Wpis zostaje zapisany."
        required: false
        default: true
      - name: "show_calendar_button"
        label: "📅 Przycisk kalendarza"
        widget: "boolean"
        hint: "Wyłącz dla przerw bez eksportu ICS."
        required: false
        default: true
      - name: "order"
        label: "🔢 Kolejność wyświetlania"
        widget: "number"
        hint: "Kolejność przycisków filtrów."
        required: false
        default: 99
      - name: "active"
        label: "👁️ Widoczny na stronie"
        widget: "boolean"
        hint: "true = widoczny dla odwiedzających, false = ukryty. Wpis zostaje zapisany."
        required: false
        default: true
