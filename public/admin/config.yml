    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - name: "title"
        label: "📝 Tytuł"
        widget: "string"
        hint: "Tytuł wpisu blogowego."
        required: true
      - name: "description"
        label: "📄 Opis"
        widget: "text"
        hint: "Krótki opis wpisu."
        required: true
      - name: "pubDate"
        label: "📅 Data publikacji"
        widget: "datetime"
        hint: "Data publikacji wpisu."
        required: true
      - name: "updatedDate"
        label: "📅 Data aktualizacji"
        widget: "datetime"
        hint: "Opcjonalna data ostatniej zmiany."
        required: false
      - name: "draft"
        label: "📝 Szkic"
        widget: "boolean"
        hint: "true = widoczny dla odwiedzających, false = ukryty. Wpis zostaje zapisany."
        required: false
        default: false
