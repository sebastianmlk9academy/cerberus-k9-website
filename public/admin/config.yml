        label: "Kategoria"
        widget: "select"
        hint: "📍 Gdzie: /o-wydarzeniu → kolor kafelka w agendzie. ⚠️ Wybierz kategorię zgodną z typem modułu. Decyduje o kolorze na osi. ✏️ K9-Gryzienie=czerwony, TCCC=bordowy, BREAK=szary"
        options: ["K9-Gryzienie","K9-Detekcja","K9-SAR","TCCC","Drony","HARDEST HIT","Konferencja","BREAK","CEREMONIA","Inne"]
