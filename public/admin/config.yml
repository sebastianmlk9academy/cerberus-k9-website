  # ─── AMBASADORZY ──────────────────────────────────────
  - name: "ambasadorzy"
    label: "🌍 Ambasadorzy"
    label_singular: "Ambasador"
    folder: "src/content/ambasadorzy"
    create: true
    delete: true
    slug: "{{slug}}"
    description: "Ambasadorzy CERBERUS K9 promujący wydarzenie w swoich krajach."
    preview_path: "/pl/ambasadorzy"
    media_folder: "public/uploads/ambasadorzy"
    public_folder: "/uploads/ambasadorzy"
    fields:
      - label: "👤 Imię i Nazwisko"
        name: "name"
        widget: "string"
        required: true
        hint: "📍 Karta ambasadora na stronie /ambasadorzy."
      - label: "🌍 Kraj"
        name: "country"
        widget: "string"
        required: true
        hint: "✏️ Np. Portugalia, Czechy, USA"
      - name: "countryCode"
        label: "🏳️ Kod kraju (2 wielkie litery)"
        widget: "string"
        required: true
        pattern: ["^[A-Z]{2}$", "❌ Dwie wielkie litery: PL, US, DE, PT, CZ..."]
        hint: "📍 Flaga kraju. PL=Polska, US=USA, DE=Niemcy, PT=Portugalia"
      - label: "🎖️ Rola / Tytuł"
        name: "role"
        widget: "string"
        required: false
        hint: "✏️ Np. Ambasador Europy Wschodniej, K9 Specialist"
      - label: "🏛️ Jednostka / Organizacja"
        name: "unit"
        widget: "string"
        required: false
        hint: "✏️ Np. Policja Krajowa Czechy"
      - name: "photo"
        label: "📸 Zdjęcie"
        widget: "image"
        required: false
        choose_url: true
        hint: "⚠️ Format: WebP, 400x400px (kwadrat), max 200KB."
      - label: "📝 Krótkie bio"
        name: "bio"
        widget: "text"
        required: false
        hint: "📍 Karta ambasadora. ⚠️ Max 200 znaków."
      - label: "💼 LinkedIn URL"
        name: "linkedinUrl"
        widget: "string"
        required: false
        hint: "✏️ https://www.linkedin.com/in/..."
      - label: "📸 Instagram URL"
        name: "instagram_url"
        widget: "string"
        required: false
        hint: "✏️ https://www.instagram.com/..."
      - label: "🔢 Kolejność"
        name: "order"
        widget: "number"
        default: 99
        hint: "Niższa liczba = wyżej. 1 = pierwszy."
      - label: "👁️ Widoczny"
        name: "active"
        widget: "boolean"
        default: true
        hint: "true = widoczny, false = ukryty bez usuwania."
      - label: "⏳ Wymaga akceptacji"
        name: "needs_review"
        widget: "boolean"
        default: false
        hint: "true = oczekuje sprawdzenia, false = zaakceptowany."

  # ─── CERTYFIKATY ──────────────────────────────────────
  - name: "certyfikaty"
    label: "🏅 Certyfikaty Uczestnictwa"
    label_singular: "Certyfikat"
    folder: "src/content/certyfikaty"
    create: true
    delete: true
    slug: "{{certificate_id}}"
    identifier_field: "certificate_id"
    description: "Certyfikaty dla uczestników. Każdy dostępny pod /certyfikat/[ID]"
    preview_path: "/pl/certyfikat/{{certificate_id}}"
    fields:
      - name: "certificate_id"
        label: "🔑 ID Certyfikatu"
        widget: "string"
        required: true
        pattern: ["^[A-Z0-9-]+$", "❌ Wielkie litery, cyfry, myślniki. Np. CK9-2026-001"]
        hint: >
          📍 URL: cerberusk9.org/certyfikat/[ID]
          ✏️ Format: CK9-2026-001
          ⚠️ NIE zmieniaj po utworzeniu — psuje wysłane linki!
      - label: "👤 Imię i Nazwisko uczestnika"
        name: "participant_name"
        widget: "string"
        required: true
        hint: "📍 Wydrukowane na certyfikacie."
      - name: "module"
        label: "📋 Moduł szkoleniowy"
        widget: "select"
        required: true
        hint: "Moduł za który wystawiany jest certyfikat."
        options:
          - { label: "K9 Combat", value: "K9 Combat" }
          - { label: "K9 Search & Rescue", value: "K9 SAR" }
          - { label: "TCCC — Medycyna taktyczna", value: "TCCC" }
          - { label: "Drony ISR / Bojowe", value: "Drony" }
          - { label: "Hardest Hit", value: "Hardest Hit" }
          - { label: "Konferencja ZK", value: "Konferencja" }
          - { label: "Uczestnik Ogólny", value: "Uczestnik" }
      - name: "event_edition"
        label: "📅 Edycja"
        widget: "relation"
        collection: "gallery_editions"
        search_fields: ["label_pl", "value"]
        value_field: "value"
        display_fields: ["label_pl"]
        required: true
        hint: "Wybierz edycję z listy."
      - name: "issue_date"
        label: "📅 Data wystawienia"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false
        required: true
        hint: "Data widoczna na certyfikacie."
      - label: "🎖️ Instruktor (opcjonalnie)"
        name: "instructor_name"
        widget: "string"
        required: false
        hint: "Imię instruktora prowadzącego moduł."
      - label: "👁️ Certyfikat aktywny"
        name: "active"
        widget: "boolean"
        default: true
        hint: "true = link /certyfikat/[ID] aktywny, false = strona 404."

  # ─── SZKOLENIA ────────────────────────────────────────
  - name: "szkolenia"
    label: "🎓 Szkolenia Komercyjne"
