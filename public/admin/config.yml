        format: "YYYY-MM-DD-HH-mm"
        date_format: "DD.MM.YYYY"
        time_format: "HH:mm"
        required: true
        hint: "Najnowszy komunikat pojawia się na górze strony /live."
      - name: "message"
        label: "📢 Treść komunikatu"
        widget: "text"
        required: true
        hint: >
          📍 Widoczny na stronie /live podczas wydarzenia.
          ✏️ Np.: Zawody Hardest Hit startują o 14:30 na Arenie Głównej.
          ⚠️ Pisz krótko i konkretnie. Max 200 znaków.
      - name: "type"
        label: "🏷️ Typ komunikatu"
        widget: "select"
        default: "info"
        hint: "Wpływa na kolor i ikonę komunikatu."
        options:
          - { label: "ℹ️ Informacja ogólna", value: "info" }
          - { label: "⚠️ Zmiana w programie", value: "warning" }
          - { label: "🏆 Wynik / Ogłoszenie", value: "result" }
          - { label: "🚨 Pilne / Ważne", value: "urgent" }
      - label: "👁️ Widoczny"
        name: "active"
        widget: "boolean"
        default: true
        hint: "true = komunikat na /live, false = archiwizowany."

  # ─── HARDEST HIT WYNIKI ───────────────────────────────
  - name: "hardest_hit_results"
    label: "🏆 Hardest Hit — Wyniki"
    label_singular: "Wynik"
    folder: "src/content/hardest_hit_results"
    create: true
    delete: true
    slug: "{{slug}}"
    description: "Wyniki zawodów. Aktualizuj na bieżąco podczas zawodów."
    preview_path: "/pl/hardest-hit"
    fields:
      - label: "👤 Imię i Nazwisko zawodnika"
        name: "competitor_name"
        widget: "string"
        required: true
        hint: "📍 Tabela wyników na stronie /hardest-hit."
      - label: "🌍 Kraj"
        name: "country"
        widget: "string"
        required: true
        hint: "✏️ Np. Polska, USA, Niemcy"
      - name: "countryCode"
        label: "🏳️ Kod kraju"
        widget: "string"
        required: true
        pattern: ["^[A-Z]{2}$", "❌ Dwie wielkie litery: PL, US, DE"]
        hint: "PL, US, DE, PT, CZ..."
      - name: "category"
        label: "🏷️ Kategoria"
        widget: "select"
        required: true
        options:
          - { label: "Open — Mężczyźni", value: "open_men" }
          - { label: "Open — Kobiety", value: "open_women" }
          - { label: "Służby mundurowe", value: "services" }
          - { label: "K9 Handler", value: "k9_handler" }
          - { label: "Weterani", value: "veterans" }
      - label: "🏋️ Wynik (z jednostką)"
        name: "score"
        widget: "string"
        required: true
        hint: "✏️ Np. 245 kg lub 00:45:23"
      - label: "🥇 Miejsce"
        name: "rank"
        widget: "number"
        value_type: "int"
        min: 1
        required: true
        hint: "1 = pierwsze miejsce."
      - name: "round"
        label: "🔄 Runda"
        widget: "select"
        default: "final"
        options:
          - { label: "Eliminacje", value: "elimination" }
          - { label: "Półfinał", value: "semifinal" }
          - { label: "Finał", value: "final" }
      - name: "edition"
        label: "📅 Edycja"
        widget: "relation"
        collection: "gallery_editions"
        search_fields: ["label_pl", "value"]
        value_field: "value"
        display_fields: ["label_pl"]
        default: "2026"
        hint: "Wybierz edycję z listy."
      - label: "👁️ Widoczny"
        name: "active"
        widget: "boolean"
        default: true
      - label: "⏳ Do weryfikacji sędziego"
        name: "needs_review"
        widget: "boolean"
        default: false
        hint: "true = oczekuje potwierdzenia, false = zatwierdzony."

  # ─── MATERIAŁY SPONSORSKIE ────────────────────────────
  - name: "sponsor_materials"
    label: "📄 Materiały dla Sponsorów"
    label_singular: "Materiał"
    folder: "src/content/sponsor_materials"
    create: true
    delete: true
    slug: "{{slug}}"
    description: "Oferty sponsorskie PDF do pobrania przez potencjalnych partnerów."
    media_folder: "public/uploads/sponsor_materials"
    public_folder: "/uploads/sponsor_materials"
    fields:
      - label: "📝 Nazwa dokumentu"
        name: "title"
        widget: "string"
        required: true
        hint: "📍 Link na stronie /partnerzy."
      - name: "file"
        label: "📎 Plik PDF"
        widget: "file"
        required: true
        hint: "⚠️ Format: PDF, max 5MB. Nazwa bez spacji i polskich liter."
      - label: "📋 Krótki opis"
        name: "description"
        widget: "string"
        required: false
        hint: "✏️ Np. Pełna oferta sponsorska z pakietami cenowymi"
      - name: "edition"
        label: "📅 Edycja"
        widget: "relation"
        collection: "gallery_editions"
        search_fields: ["label_pl", "value"]
        value_field: "value"
        display_fields: ["label_pl"]
        required: false
        hint: "Edycja której dotyczy dokument."
      - name: "language"
        label: "🌍 Język dokumentu"
        widget: "select"
        default: "pl"
        options:
          - { label: "🇵🇱 Polski", value: "pl" }
          - { label: "🇬🇧 Angielski", value: "en" }
          - { label: "🇩🇪 Niemiecki", value: "de" }
      - label: "🔢 Kolejność"
        name: "order"
        widget: "number"
        default: 10
      - label: "👁️ Dostępny do pobrania"
        name: "active"
        widget: "boolean"
        default: true
        hint: "true = link aktywny, false = tymczasowo niedostępny."

  # ─── ZDJĘCIA PRASOWE ──────────────────────────────────
  - name: "press_photos"
    label: "📷 Zdjęcia Prasowe"
    label_singular: "Pakiet zdjęć"
    folder: "src/content/press_photos"
    create: true
    delete: true
    slug: "{{slug}}"
    description: "Zdjęcia hi-res dla mediów. Widoczne na stronie /media."
