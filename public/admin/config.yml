# Decap CMS — CERBERUS K9
# Replace [YOUR_GITHUB_USERNAME] in `repo` with your GitHub org or username (remove brackets).
# Netlify: enable Git Gateway / OAuth and point the site at this repo.

backend:
  name: github
  repo: '[YOUR_GITHUB_USERNAME]/cerberus-k9-website'
  branch: main
  base_url: https://api.netlify.com

# Media uploaded from the CMS lands in the repo under public/uploads
media_folder: public/uploads
public_folder: /uploads

locale: pl

collections:
  # --- 1. Aktualności (blog posts) ---
  - name: aktualnosci
    label: Aktualności
    label_singular: Wpis
    folder: src/content/aktualnosci
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    preview_path: 'pl/aktualnosci/{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - { label: Tytuł, name: title, widget: string, required: true }
      - { label: Data publikacji, name: date, widget: datetime, required: true, date_format: YYYY-MM-DD, time_format: HH:mm }
      - label: Kategoria
        name: category
        widget: select
        required: true
        options:
          - Aktualności
          - Instruktorzy
          - Partnerzy
          - Rejestracja
          - Media
          - HARDEST HIT
      - label: Lead
        name: lead
        widget: text
        required: true
        hint: 'Krótki opis artykułu, max 500 znaków'
        pattern:
          - '^.{1,500}$'
          - 'Maksymalnie 500 znaków'
      - { label: Treść, name: body, widget: markdown, required: true }
      - { label: Obraz wyróżniający, name: image, widget: image, required: false, choose_url: true }
      - { label: Opis obrazu (alt), name: image_alt, widget: string, required: false }
      - label: Tagi
        name: tags
        widget: list
        required: false
        hint: "Np. K9, TCCC, NATO, 2026"
        field: { label: Tag, name: tag, widget: string }
      - { label: Punkt centralny zdjęcia — poziomo (%), name: heroImageFocalX, widget: number, default: 50, min: 0, max: 100, required: false }
      - { label: Punkt centralny zdjęcia — pionowo (%), name: heroImageFocalY, widget: number, default: 50, min: 0, max: 100, required: false }
      - name: share_url
        label: "URL do udostępniania (opcjonalnie)"
        widget: string
        required: false
        hint: "Zostaw puste — system uzupełni automatycznie"

  # --- 2. Instruktorzy ---
  - name: instruktorzy
    label: Instruktorzy
    label_singular: Instruktor
    folder: src/content/instruktorzy
    create: true
    slug: '{{slug}}'
    identifier_field: name
    extension: md
    format: frontmatter
    fields:
      - { label: Imię i nazwisko, name: name, widget: string, required: true }
      - { label: Rola / stanowisko, name: role, widget: string, required: false }
      - label: "Kraj (fallback — wypełniany automatycznie)"
        name: country
        widget: string
        required: true
        hint: >
          Nazwa kraju — używana jako fallback gdy kod kraju
          nie jest w słowniku. Normalnie nazwa tłumaczona
          jest automatycznie na podstawie kodu kraju.
          Wpisz nazwę po polsku np. Polska, USA, Niemcy.
      - label: "Kod kraju (ISO 3166-1 alpha-2)"
        name: countryCode
        widget: string
        required: true
        hint: >
          Wpisz 2-literowy kod kraju (wielkie litery).
          Flaga zmieni się automatycznie.
          NATO/UE: PL, US, DE, FR, GB, IT, ES, PT, NL, BE,
          CZ, SK, HU, RO, BG, HR, SI, LT, LV, EE, NO, DK,
          SE, FI, GR, TR, CA, AL, ME, MK, BA, IS, LU, MT.
      - label: Specjalizacje
        name: specializations
        widget: select
        multiple: true
        required: true
        options:
          - K9 Gryzienie
          - K9 Detekcja
          - K9 Tropienie SAR
          - Pozorant
          - TCCC
          - TCCC-K9
          - Pierwsza Pomoc
          - Behawiorysta
          - Konferencja - Prelegent
          - Drony
      - { label: Jednostka / formacja, name: unit, widget: string, required: false }
      - { label: Moduł szkoleniowy, name: module, widget: string, required: false }
      - { label: Harmonogram, name: schedule, widget: string, required: false }
      - { label: Języki, name: languages, widget: string, default: Polski, required: false }
      - label: Typ uczestnika
        name: type
        widget: select
        options: [Instruktor, Pozorant, Lider Grupy, Prelegent, VIP]
        default: Instruktor
        required: false
      - { label: LinkedIn URL, name: linkedinUrl, widget: string, required: false }
      - { label: Pokaż na stronie głównej, name: showOnHomepage, widget: boolean, default: true }
      - label: Bio krótkie
        name: bioShort
        widget: text
        required: true
        hint: 'Maksymalnie 200 znaków.'
        pattern:
          - '^.{1,200}$'
          - 'Maksymalnie 200 znaków.'
      - { label: Bio pełne, name: bioFull, widget: markdown, required: true }
      - { label: Zdjęcie, name: photo, widget: image, required: true, choose_url: true }
      - { label: Kolejność sortowania, name: order, widget: number, value_type: int, min: 0, step: 1, default: 0 }

  # --- 3. Partnerzy ---
  - name: partnerzy
    label: Partnerzy
    label_singular: Partner
    folder: src/content/partnerzy
    create: true
    slug: '{{slug}}'
    identifier_field: name
    extension: md
    format: frontmatter
    fields:
      - { label: Nazwa, name: name, widget: string, required: false }
      - label: Typ
        name: type
        widget: select
        required: false
        options:
          - Strategiczny
          - Sponsor
          - Patron Medialny
          - Technologiczny
      - { label: Logo, name: logo, widget: image, required: false, choose_url: true, hint: 'Wgraj logo w formacie WebP. Zalecany rozmiar: 300x120px. Po wgraniu zmień rozszerzenie na .webp' }
      - { label: Strona WWW, name: website, widget: string, required: false }
      - { label: Etykieta linku WWW, name: website_label, widget: string, required: false }
      - { label: Opis, name: description, widget: text, required: false }
      - { label: Kolejność sortowania, name: order, widget: number, value_type: int, min: 0, step: 1, default: 0 }
      - name: show_in_strip
        label: "Pokaż w pasku partnerów (strona główna)"
        widget: boolean
        default: true
        hint: "Czy partner ma się wyświetlać w scrollującym pasku na stronie głównej"
      - name: strip_order
        label: "Kolejność w pasku"
        widget: number
        default: 99
        hint: "Kolejność wyświetlania w scrollującym pasku na stronie głównej"

  # --- 4. Galeria ---
  - name: galeria
    label: Galeria
    label_singular: Zdjęcie
    folder: src/content/galeria
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - { label: Tytuł, name: title, widget: string, required: false }
      - { label: Data, name: date, widget: date, required: false, format: YYYY-MM-DD }
      - label: Kategoria
        name: category
        widget: select
        required: false
        options:
          - HARDEST HIT
          - SZKOLENIA K9
          - CEREMONIA
          - KONFERENCJA
          - DRONY
          - SAR
          - OGÓLNE
      - label: Edycja
        name: edition
        widget: select
        required: false
        default: '2026'
        options:
          - '2025'
          - '2026'
      - { label: Tekst alternatywny (SEO), name: alt, widget: string, required: false }
      - { label: Lokalizacja, name: location, widget: string, required: false }
      - { label: Zdjęcie, name: photo, widget: image, required: true, choose_url: true }
      - label: Tagi
        name: tags
        widget: list
        required: false
        summary: '{{fields.tag}}'
        field:
          label: Tag
          name: tag
          widget: string

  # --- 5. Program (agenda) ---
  - name: program
    label: Program
    label_singular: Punkt programu
    folder: src/content/program
    create: true
    delete: true
    slug: '{{day}}-{{slug}}'
    preview_path: "pl/o-wydarzeniu"
    extension: md
    format: frontmatter
    fields:
      - label: Dzień (YYYY-MM-DD)
        name: day
        widget: string
        required: true
        hint: 'np. 2026-06-13'
      - name: time_start
        label: "Godzina rozpoczęcia"
        widget: string
        pattern: ['^\d{2}:\d{2}$', "Format HH:MM, np. 09:00"]
        hint: "Format 24h, np. 09:00"
      - name: time_end
        label: "Godzina zakończenia"
        widget: string
        pattern: ['^\d{2}:\d{2}$', "Format HH:MM, np. 12:30"]
        hint: "Format 24h, np. 12:30"
      - { label: Tytuł, name: title, widget: string, required: true }
      - { label: Opis, name: description, widget: text, required: false }
      - label: Lokalizacja
        name: location
        widget: select
        required: false
        default: "Arena Główna"
        options:
          - "Arena Główna"
          - "3MK Arena"
          - "Szkoła Mundurowa"
          - "Stadion Miejski"
          - "Sala Konferencyjna"
          - "Infrastruktura Orlen"
          - "—"
      - name: locationMapUrl
        label: "Link do nawigacji (Google Maps)"
        widget: string
        required: false
        hint: "Wklej link z Google Maps z pinezką lokalizacji. Np. https://maps.google.com/?q=..."
      - label: Kategoria
        name: category
        widget: string
        hint: "Wpisz klucz kategorii z kolekcji 'Agenda — Kategorie i filtry', np. K9, TCCC, DRONY"
        default: "K9"
      - { label: Instruktor / prowadzący, name: instructor, widget: string, required: false }
      - { label: Kolejność w dniu, name: order, widget: number, default: 99 }
      - { label: "Aktywny", name: active, widget: boolean, default: true }

  - name: agenda_categories
    label: "Agenda — Kategorie i filtry"
    folder: "src/content/agenda_categories"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - name: key
        label: "Klucz (unikalny, wielkie litery, np. K9)"
        widget: string
        hint: "Użyty jako wartość w polu category w programie. Np. K9, TCCC, DRONY"
        pattern: ['^[A-Z0-9_]+$', "Tylko wielkie litery, cyfry i podkreślniki"]
      - name: label_pl
        label: "Etykieta (PL)"
        widget: string
      - name: label_en
        label: "Etykieta (EN)"
        widget: string
        required: false
      - name: color
        label: "Kolor (hex)"
        widget: color
        default: "#C4922A"
        hint: "Kolor tagu i akcentu na osi czasu"
      - name: show_in_filter
        label: "Pokaż w filtrach"
        widget: boolean
        default: true
        hint: "Czy ta kategoria ma być widoczna jako przycisk filtra"
      - name: show_calendar_button
        label: "Pokaż przycisk kalendarza"
        widget: boolean
        default: true
        hint: "Wyłącz dla kategorii PRZERWA"
      - name: order
        label: "Kolejność w filtrach"
        widget: number
        default: 99
      - name: active
        label: "Aktywna"
        widget: boolean
        default: true

  # --- 6. Ustawienia serwisu (jeden plik) ---
  - name: ustawienia
    label: Ustawienia serwisu
    files:
      - name: ustawienia
        label: Ustawienia globalne
        file: src/content/ustawienia.yml
        format: yaml
        fields:
          - { label: Data wydarzenia (start), name: event_date, widget: datetime, format: YYYY-MM-DD, date_format: DD.MM.YYYY, time_format: false }
          - { label: Data wydarzenia (koniec), name: event_date_end, widget: datetime, format: YYYY-MM-DD, date_format: DD.MM.YYYY, time_format: false }
          - { label: Miasto, name: event_city, widget: string }
          - { label: Główna lokalizacja, name: event_venue, widget: string }
          - { label: Liczba uczestników (wyświetlana), name: participants_count, widget: string, default: "250+" }
          - { label: Liczba krajów (wyświetlana), name: countries_count, widget: string, default: "15+" }
          - { label: Liczba psów (wyświetlana), name: dogs_count, widget: string, default: "80+" }
          - { label: Liczba modułów (wyświetlana), name: modules_count, widget: string, default: "8" }
          - { label: URL Pretix (rejestracja), name: pretix_url, widget: string }
          - { label: URL video hero (opcjonalnie), name: hero_video_url, widget: string, required: false }
          - { label: "Tło Hero — zdjęcie", name: hero_background_image, widget: image, required: false }
          - label: "Tło Hero — przezroczystość (0.1–1.0)"
            name: hero_background_opacity
            widget: number
            default: 0.4
            min: 0.1
            max: 1.0
            step: 0.05
          - { label: Domena Plausible, name: plausible_domain, widget: string }
          - { label: Rejestracja aktywna, name: registration_active, widget: boolean, default: true }
          - { label: HARDEST HIT aktywny, name: hardest_hit_active, widget: boolean, default: true }
          - { label: Pasek powiadomień aktywny, name: notification_bar_active, widget: boolean, default: false }
          - { label: Tekst paska powiadomień, name: notification_bar_text, widget: string, required: false }
          - { label: Link paska powiadomień, name: notification_bar_url, widget: string, required: false }
          - { label: Tryb LIVE aktywny, name: live_mode_active, widget: boolean, default: false }
          - { label: Email kontaktowy (stopka/formularz), name: footer_email, widget: string }
          - { label: Telefon kontaktowy, name: footer_phone, widget: string }
          - { label: Facebook URL, name: social_facebook, widget: string }
          - { label: YouTube URL, name: social_youtube, widget: string }
          - { label: Instagram URL, name: social_instagram, widget: string, required: false }
          - { label: LinkedIn URL, name: social_linkedin, widget: string, required: false }
          - { label: Twitter/X URL, name: social_twitter, widget: string, required: false }
          - { label: "Twitter/X handle", name: twitter_handle, widget: string, default: "@cerberusk9", required: false }
          - { label: Statut fundacji (PDF), name: statute_pdf, widget: string }
          - { label: KRS — link do rejestru, name: krs_url, widget: string }
          - { label: Główne wideo YouTube URL, name: main_video_youtube, widget: string }
          - { label: Tytuł głównego wideo, name: main_video_title, widget: string }
          - { label: Główne wideo — badge (linia 1), name: video_badge_1, widget: string, required: false }
          - { label: Wideo 2 — URL, name: video_url_2, widget: string, required: false }
          - { label: Wideo 2 — Badge (np. TVP), name: video_badge_2, widget: string, required: false }
          - { label: Wideo 3 — URL, name: video_url_3, widget: string, required: false }
          - { label: Wideo 3 — Badge, name: video_badge_3, widget: string, required: false }
          - { label: Wideo 4 — URL, name: video_url_4, widget: string, required: false }
          - { label: Wideo 4 — Badge, name: video_badge_4, widget: string, required: false }
          - { label: Data rejestracji (wyświetlana), name: registration_date_display, widget: string }
          - { label: Dzień przygotowawczy, name: registration_prep_day, widget: string }
          - { label: Lokalizacje (przecinek), name: registration_venues, widget: string }
          - { label: Miasto wydarzenia, name: registration_city, widget: string }
          - { label: Email rejestracyjny, name: registration_contact_email, widget: string }
          - { label: Telefon rejestracyjny, name: registration_contact_phone, widget: string }
          - { label: Deadline akredytacji mediów, name: accreditation_deadline, widget: string }
          - { label: CTA Zostań Partnerem — href, name: partner_cta_href, widget: string }
          - { label: CTA Zostań Partnerem — link pełny (opcjonalnie), name: partner_cta_href_full, widget: string, required: false }
          - { label: "Logo nawigacji", name: nav_logo, widget: image }
          - { label: "Logo — tekst alternatywny", name: nav_logo_alt, widget: string }
          - { label: "Nazwa marki", name: brand_name, widget: string }
          - { label: "Podtytuł marki", name: brand_tagline, widget: string }
          - { label: "Adres fundacji", name: footer_address, widget: string }
          - { label: "Nazwa fundacji", name: footer_foundation_name, widget: string }
          - { label: "Domeny (stopka)", name: footer_domains, widget: string }
          - { label: "KRS", name: krs_number, widget: string }
          - { label: "NIP", name: nip_number, widget: string }
          - { label: "REGON", name: regon_number, widget: string }
          - { label: "Domyślne zdjęcie aktualności", name: default_news_image, widget: image, required: false }
          - { label: "Placeholder zdjęcie instruktora", name: instructor_placeholder_photo, widget: image, required: false }
          - { label: "Press kit ZIP (URL)", name: press_kit_zip, widget: string, required: false }
          - { label: "PDF Polska Zbrojna", name: press_pdf_polska_zbrojna, widget: string, required: false }
          - { label: "PDF Special Ops", name: press_pdf_special_ops, widget: string, required: false }
          - { label: "Kontakt media — imię i nazwisko", name: media_contact_name, widget: string }
          - { label: "Kontakt media — telefon", name: media_contact_phone, widget: string }
          - { label: "Kontakt media — email", name: media_contact_email, widget: string }
          - { label: "Email Prezesa", name: president_email, widget: string }
          - { label: "Mapa embed URL", name: map_embed_url, widget: string, required: false }
          - { label: "Adres lokalizacji (kontakt)", name: venue_address, widget: string }
          - { label: "URL strony agendy (publiczny)", name: agenda_page_url, widget: string }
          - { label: "URL strony (główny)", name: site_url, widget: string }
          - { label: "OG Image domyślny", name: og_image_default, widget: image, required: false }
          - { label: "Strefa czasowa", name: event_timezone, widget: string, default: "Europe/Warsaw" }
          - { label: "Data odblokowania galerii 2026", name: gallery_unlock_date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", time_format: false }
          - { label: "Oferta sponsorska — PDF (URL)", name: sponsor_offer_pdf, widget: string, required: false, hint: "Zostaw puste jeśli nie ma PDF — użyty zostanie kontakt mailowy" }
          - { label: "Email kontakt sponsoring", name: sponsor_contact_email, widget: string }
          - { label: "Wideo galerii 1 — tytuł", name: gallery_video_1_title, widget: string, required: false }
          - { label: "Wideo galerii 1 — URL", name: gallery_video_1_url, widget: string, required: false }
          - { label: "Wideo galerii 1 — badge", name: gallery_video_1_badge, widget: string, required: false }
          - { label: "Wideo galerii 2 — tytuł", name: gallery_video_2_title, widget: string, required: false }
          - { label: "Wideo galerii 2 — URL", name: gallery_video_2_url, widget: string, required: false }
          - { label: "Wideo galerii 2 — badge", name: gallery_video_2_badge, widget: string, required: false }
          - { label: "Wideo galerii 3 — tytuł", name: gallery_video_3_title, widget: string, required: false }
          - { label: "Wideo galerii 3 — URL", name: gallery_video_3_url, widget: string, required: false }
          - { label: "Wideo galerii 3 — badge", name: gallery_video_3_badge, widget: string, required: false }
          - { label: "Wideo galerii 4 — tytuł", name: gallery_video_4_title, widget: string, required: false }
          - { label: "Wideo galerii 4 — URL", name: gallery_video_4_url, widget: string, required: false }
          - { label: "Wideo galerii 4 — badge", name: gallery_video_4_badge, widget: string, required: false }

  - name: faq
    label: "FAQ — Najczęstsze pytania"
    folder: "src/content/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Pytanie (PL)", name: question_pl, widget: string }
      - { label: "Odpowiedź (PL)", name: answer_pl, widget: text }
      - { label: "Pytanie (EN)", name: question_en, widget: string, required: false }
      - { label: "Odpowiedź (EN)", name: answer_en, widget: text, required: false }
      - { label: "Kolejność", name: order, widget: number, default: 99 }
      - { label: "Aktywne", name: active, widget: boolean, default: true }

  - name: team
    label: "Zarząd — Członkowie"
    folder: "src/content/team"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Imię i nazwisko", name: name, widget: string }
      - { label: "Rola", name: role, widget: string }
      - { label: "Zdjęcie", name: photo, widget: image, required: false }
      - { label: "Jednostka / formacja", name: unit, widget: string, required: false }
      - { label: "Bio (krótkie)", name: bio_short, widget: text }
      - { label: "Email", name: email, widget: string, required: false }
      - { label: "LinkedIn", name: linkedin, widget: string, required: false }
      - { label: "Kolejność", name: order, widget: number, default: 99 }

  - name: homepage_cards
    label: "Strona główna — karty programu"
    folder: "src/content/homepage_cards"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Kategoria", name: category, widget: select, options: ["K9", "TCCC", "DRONY", "KONFERENCJA"] }
      - { label: "Ikona (opcjonalnie)", name: icon, widget: string, required: false, hint: "Nazwa ikony lucide-react np. Shield, Target, Crosshair" }
      - { label: "Kolor akcentu (hex)", name: color, widget: color, default: "#C4922A", required: false }
      - { label: "Tytuł (PL)", name: title_pl, widget: string }
      - { label: "Opis (PL)", name: description_pl, widget: text }
      - { label: "Badge (PL)", name: badge_pl, widget: string, required: false }
      - { label: "Tytuł (EN)", name: title_en, widget: string, required: false }
      - { label: "Opis (EN)", name: description_en, widget: text, required: false }
      - { label: "Badge (EN)", name: badge_en, widget: string, required: false }
      - { label: "Tytuł (DE)", name: title_de, widget: string, required: false }
      - { label: "Opis (DE)", name: description_de, widget: text, required: false }
      - { label: "Badge (DE)", name: badge_de, widget: string, required: false }
      - { label: "Tytuł (FR)", name: title_fr, widget: string, required: false }
      - { label: "Opis (FR)", name: description_fr, widget: text, required: false }
      - { label: "Badge (FR)", name: badge_fr, widget: string, required: false }
      - { label: "Tytuł (HR)", name: title_hr, widget: string, required: false }
      - { label: "Opis (HR)", name: description_hr, widget: text, required: false }
      - { label: "Badge (HR)", name: badge_hr, widget: string, required: false }
      - { label: "Tytuł (CS)", name: title_cs, widget: string, required: false }
      - { label: "Opis (CS)", name: description_cs, widget: text, required: false }
      - { label: "Badge (CS)", name: badge_cs, widget: string, required: false }
      - { label: "Tytuł (LT)", name: title_lt, widget: string, required: false }
      - { label: "Opis (LT)", name: description_lt, widget: text, required: false }
