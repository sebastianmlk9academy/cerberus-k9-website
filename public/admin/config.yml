  # ─── GALERIA: TAGI ────────────────────────────────────
  - name: "gallery_tags"
    label: "🏷️ Galeria — Tagi"
    label_singular: "Tag"
    folder: "src/content/gallery_tags"
    create: true
    delete: true
    slug: "{{key}}"
    identifier_field: "key"
    description: "Tagi zdjęć galerii. Zmiana etykiety tagu aktualizuje się wszędzie automatycznie."
    fields:
      - name: "key"
        label: "🔑 Klucz tagu (unikalny)"
        widget: "string"
        required: true
        pattern: ["^[a-z0-9_]+$", "❌ Tylko małe litery, cyfry, podkreślnik"]
        hint: >
          ✏️ Np. hardest_hit_2026, ceremonia, pokaz_k9
          ⚠️ NIE zmieniaj po dodaniu do zdjęć — klucz jest zapisany w plikach!
      - label: "🇵🇱 Etykieta PL"
        name: "label_pl"
        widget: "string"
        required: true
        hint: "📍 Widoczna na karcie zdjęcia i w filtrach."
      - label: "🇬🇧 Etykieta EN"
        name: "label_en"
        widget: "string"
        required: false
      - label: "🇩🇪 Etykieta DE"
        name: "label_de"
        widget: "string"
        required: false
      - name: "color"
        label: "🎨 Kolor etykiety"
        widget: "color"
        required: false
        hint: "Kolor tagu na karcie zdjęcia. Puste = domyślny szary."
      - label: "👁️ Aktywny"
        name: "active"
        widget: "boolean"
        default: true
        hint: "true = dostępny do wyboru, false = ukryty z listy."

  - name: "galeria"
    label: "🖼️ Galeria — Zdjęcia"
    description: "Zdjęcia z edycji — siatka na /galeria."
    preview_path: "/pl/galeria"
    media_folder: "public/uploads/galeria"
    public_folder: "/uploads/galeria"
    folder: "src/content/galeria"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - name: "title"
        label: "📝 Tytuł zdjęcia"
        widget: "string"
        hint: "Opcjonalny tytuł podglądu w lightboxie."
        required: false
      - name: "date"
        label: "📅 Data zdjęcia"
        widget: "date"
        hint: "Data w sortowaniu i filtrach galerii."
        required: false
        format: "YYYY-MM-DD"
      - name: "photo"
        label: "📸 Zdjęcie"
        widget: "image"
        hint: "Zalecany format: WebP. Rozmiar: 1600×900px. Główne zdjęcie w siatce galerii."
        required: true
        choose_url: true
      - name: "alt"
        label: "♿ Opis zdjęcia (alt)"
        widget: "string"
        hint: "Opis dla SEO i czytników ekranu — wymagany sens opisu."
        required: true
      - label: "🏷️ Kategoria"
        name: "category"
        widget: "select"
        required: false
        hint: "Filtr i plakietka kategorii na zdjęciu w galerii."
        options:
          - label: "HARDEST HIT"
            value: "HARDEST_HIT"
          - label: "SZKOLENIA K9"
            value: "SZKOLENIA_K9"
          - label: "CEREMONIA"
            value: "CEREMONIA"
          - label: "KONFERENCJA"
            value: "KONFERENCJA"
          - label: "DRONY"
            value: "DRONY"
          - label: "SAR"
            value: "SAR"
          - label: "TCCC / Medycyna"
            value: "TCCC"
          - label: "OGÓLNE"
            value: "OGOLNE"
      - name: "edition"
        label: "📅 Edycja"
        widget: "relation"
        collection: "gallery_editions"
        search_fields: ["label_pl", "value"]
        value_field: "value"
        display_fields: ["label_pl"]
        required: true
        hint: >
          📍 Widoczna w filtrze i na karcie zdjęcia.
          ⚠️ Wybieraj z listy!
          Nową edycję dodaj w sekcji '📅 Galeria — Edycje' w menu.
      - name: "location"
        label: "📍 Lokalizacja"
        widget: "relation"
        collection: "gallery_locations"
        search_fields: ["label_pl", "value"]
        value_field: "value"
        display_fields: ["label_pl"]
        required: false
        hint: >
          📍 Widoczna na karcie zdjęcia i w filtrze lokalizacji.
          ⚠️ Wybieraj z listy!
          Nową lokalizację dodaj w sekcji '📍 Galeria — Lokalizacje' w menu.
      - name: "tags"
        label: "🏷️ Tagi zdjęcia"
        widget: "list"
        required: false
        hint: >
          📍 Widoczne na karcie zdjęcia, używane w wyszukiwarce.
          ⚠️ Wybieraj z listy — nie wpisuj ręcznie!
          Nowy tag dodaj w sekcji '🏷️ Galeria — Tagi' w menu.
        field:
          name: "tag"
          label: "Tag"
          widget: "relation"
          collection: "gallery_tags"
          search_fields: ["label_pl", "key"]
          value_field: "key"
          display_fields: ["label_pl"]
      - name: "media_type"
        label: "🎬 Typ zawartości"
        widget: "select"
        default: "photo"
        required: true
        hint: >
          📸 photo = zdjęcie z wydarzenia
          🎬 video = film YouTube/Vimeo
          📰 press = relacja medialna (artykuł, TV, radio)
          ⚠️ Wypełnij tylko pola odpowiednie dla wybranego typu!
        options:
          - { label: "📸 Zdjęcie", value: "photo" }
          - { label: "🎬 Film wideo", value: "video" }
          - { label: "📰 Relacja medialna", value: "press" }
      - name: "video_url"
        label: "▶️ URL wideo [TYLKO dla: Film wideo]"
        widget: "string"
        required: false
        hint: >
          ✏️ https://www.youtube.com/watch?v=XXXXX
          lub https://youtu.be/XXXXX
          ⚠️ Wypełnij TYLKO jeśli wybrałeś typ 'Film wideo'!
      - name: "video_platform"
        label: "📺 Platforma [TYLKO dla: Film wideo]"
        widget: "select"
        required: false
        default: "youtube"
        options:
          - { label: "YouTube", value: "youtube" }
          - { label: "Vimeo", value: "vimeo" }
      - name: "video_thumbnail"
        label: "🖼️ Miniatura wideo (opcjonalna)"
        widget: "image"
        required: false
        choose_url: true
        hint: "Puste = miniatura z YouTube automatycznie. WebP 640x360px."
        media_folder: "public/uploads/galeria/video"
        public_folder: "/uploads/galeria/video"
      - name: "press_outlet"
        label: "📰 Nazwa medium [TYLKO dla: Relacja]"
        widget: "string"
        required: false
        hint: "✏️ Np. TVP Poznań, Radio Merkury, Polska Zbrojna"
      - name: "press_outlet_logo"
        label: "🖼️ Logo medium"
        widget: "image"
        required: false
        choose_url: true
        hint: "WebP 300x100px."
        media_folder: "public/uploads/media_logos"
        public_folder: "/uploads/media_logos"
      - name: "press_url"
        label: "🔗 Link do relacji [TYLKO dla: Relacja]"
        widget: "string"
        required: false
        hint: "Pełny URL. Musi zaczynać się od https://"
      - name: "press_date"
        label: "📅 Data relacji"
        widget: "string"
        required: false
        hint: "✏️ Np. 2026-06-15"
      - name: "press_description"
        label: "📝 Opis relacji"
        widget: "text"
        required: false
        hint: "Krótki opis pod nazwą medium. Max 150 znaków."
      - name: "order"
        label: "🔢 Kolejność wyświetlania"
        widget: "number"
        hint: "Sortowanie w obrębie kategorii / roku."
        required: false
        default: 100
        value_type: "int"
        min: 0
        max: 9999
      - name: "active"
        label: "👁️ Widoczny na stronie"
        widget: "boolean"
        hint: "true = widoczny dla odwiedzających, false = ukryty. Wpis zostaje zapisany."
        required: false
        default: true
      - name: "needs_review"
        label: "⏳ Wymaga akceptacji przed publikacją"
        widget: "boolean"
        default: false
        hint: >
          true = wpis oczekuje na sprawdzenie przez redaktora naczelnego.
          false = wpis zaakceptowany i gotowy do publikacji.
          Użyj tego pola gdy nie jesteś pewien czy wpis jest gotowy.
