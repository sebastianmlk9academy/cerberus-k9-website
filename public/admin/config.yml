        hint: "✏️ Np. TVP Poznań, Radio Merkury, Polska Zbrojna"
      - name: "press_outlet_logo"
        label: "🖼️ Logo medium"
        widget: "image"
        required: false
        choose_url: true
        hint: "WebP 300x100px."
        media_folder: "public/uploads/media_logos"
        public_folder: "/uploads/media_logos"
      - name: "press_url"
        label: "🔗 Link do relacji [TYLKO dla: Relacja]"
        widget: "string"
        pattern:
          - "^https?://.+$"
          - "URL musi zaczyna? si? od https://"
        required: false
        hint: "Pełny URL. Musi zaczynać się od https://"
      - name: "press_date"
        label: "📅 Data relacji"
        widget: "string"
        required: false
        hint: "✏️ Np. 2026-06-15"
      - name: "press_description"
        label: "📝 Opis relacji"
        widget: "text"
        required: false
        hint: "Krótki opis pod nazwą medium. Max 150 znaków."
      - name: "order"
        label: "🔢 Kolejność wyświetlania"
        widget: "number"
        hint: "Sortowanie w obrębie kategorii / roku."
        required: false
        default: 100
        value_type: "int"
        min: 0
        max: 9999
      - name: "active"
        label: "👁️ Widoczny na stronie"
        widget: "boolean"
        hint: "true = widoczny dla odwiedzających, false = ukryty. Wpis zostaje zapisany."
        required: false
        default: true
      - name: "needs_review"
        label: "⏳ Wymaga akceptacji przed publikacją"
        widget: "boolean"
        default: false
        hint: >
          true = wpis oczekuje na sprawdzenie przez redaktora naczelnego.
          false = wpis zaakceptowany i gotowy do publikacji.
          Użyj tego pola gdy nie jesteś pewien czy wpis jest gotowy.
  - name: "kontakt_content"
    label: "✉️ Kontakt — Treści"
    description: "Adres, mapa, dane kontaktowe i formularz na /kontakt."
    files:
      - name: "kontakt"
        label: "📄 Treści strony Kontakt"
        file: "src/content/kontakt_content.yml"
        format: "yaml"
        fields:
          - name: "contact_address"
            label: "🏠 Adres (pełny)"
            widget: "text"
            hint: "Adres wyświetlany na stronie kontakt."
            required: true
          - name: "contact_email"
            label: "✉️ E-mail kontaktowy"
            widget: "string"
            pattern:
              - "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
              - "Wpisz poprawny adres e-mail"
            hint: "Główny e-mail na /kontakt."
            required: true
          - name: "contact_phone"
            label: "📞 Telefon kontaktowy"
            widget: "string"
            hint: "Telefon na stronie kontakt."
            required: true
          - name: "contact_map_embed_url"
            label: "🗺️ URL mapy (embed)"
            widget: "string"
            hint: "Iframe mapy na stronie kontakt."
            required: false
            pattern:
              - "^https?://.+$"
              - "Wklej pełny adres URL z https://"
          - name: "contact_gdpr_text_pl"
            label: "⚖️ Zgoda RODO (PL)"
            widget: "string"
            hint: "Tekst zgody przy formularzu PL."
            required: true
          - name: "contact_gdpr_text_en"
            label: "⚖️ Zgoda RODO (EN)"
            widget: "string"
            hint: "Tekst zgody przy formularzu EN."
            required: true
          - name: "contact_form_endpoint"
            label: "📮 Endpoint formularza"
            widget: "string"
            hint: "URL POST formularza; pusty = Netlify Forms."
            required: false
          - name: "contact_form_recipient"
            label: "📮 Odbiorca formularza"
            widget: "string"
            hint: "E-mail odbiorcy wiadomości z formularza."
            required: true
          - name: "media_contact_name"
            label: "👤 Kontakt media — nazwa"
            widget: "string"
            hint: "Imię i funkcja w bloku dla mediów."
            required: false
          - name: "media_contact_phone"
            label: "📞 Kontakt media — telefon"
            widget: "string"
            hint: "Telefon dla mediów."
            required: false
          - name: "media_contact_email"
            label: "✉️ Kontakt media — e-mail"
            widget: "string"
            pattern:
              - "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
              - "Wpisz poprawny adres e-mail"
            hint: "E-mail akredytacji."
            required: false
          - name: "president_email"
            label: "✉️ E-mail prezesa"
            widget: "string"
            pattern:
              - "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
              - "Wpisz poprawny adres e-mail"
            hint: "Kontakt do prezesa fundacji."
            required: false
          - name: "accreditation_deadline"
            label: "📅 Deadline akredytacji"
            widget: "string"
            hint: "Termin zgłoszeń akredytacyjnych."
            required: false
          - name: "partner_cta_href"
            label: "🤝 CTA partner — link"
            widget: "string"
            hint: "Link przycisku partnerstwa na /kontakt."
            required: false
          - name: "sponsor_offer_pdf"
            label: "📎 Oferta sponsorska PDF"
            widget: "string"
            hint: "URL pliku PDF oferty sponsorskiej."
            required: false
          - name: "sponsor_contact_email"
            label: "✉️ E-mail sponsoring"
            widget: "string"
            pattern:
              - "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
              - "Wpisz poprawny adres e-mail"
            hint: "Kontakt ds. sponsorów."
            required: false
          - name: "sekcja_formularz"
            label: "🧾 Formularz kontaktowy — teksty PL"
            widget: "object"
            collapsed: true
            hint: >
              📍 Gdzie: strona /kontakt, formularz i panel „BEZPOŚREDNI KONTAKT”.
              ⚠️ Ważne: to są tylko teksty PL. Dla innych języków działają tłumaczenia/fallback.
              ✏️ Przykład: „Wyślij wiadomość”, „Dziękujemy! Odpowiemy…”.
            fields:
              - name: "form_name_label_pl"
                label: "👤 Etykieta pola: Imię i nazwisko"
                widget: "string"
                required: false
                default: "IMIĘ I NAZWISKO"
                pattern: ['^.{0,80}$', "❌ Maksymalnie 80 znaków"]
                hint: >
                  📍 Gdzie: etykieta pierwszego pola formularza na /kontakt.
                  ⚠️ Ważne: zalecane krótkie, czytelne słownictwo.
                  ✏️ Przykład: IMIĘ I NAZWISKO
              - name: "form_email_label_pl"
                label: "📧 Etykieta pola: E-mail"
                widget: "string"
                required: false
                default: "ADRES E-MAIL"
                pattern: ['^.{0,80}$', "❌ Maksymalnie 80 znaków"]
                hint: >
                  📍 Gdzie: etykieta pola e-mail w formularzu na /kontakt.
                  ⚠️ Ważne: max 80 znaków.
                  ✏️ Przykład: ADRES E-MAIL
              - name: "form_subject_label_pl"
                label: "🧷 Etykieta pola: Temat"
                widget: "string"
                required: false
                default: "TEMAT"
                pattern: ['^.{0,80}$', "❌ Maksymalnie 80 znaków"]
                hint: >
                  📍 Gdzie: etykieta listy rozwijanej „Temat”.
                  ⚠️ Ważne: krótka nazwa pola.
                  ✏️ Przykład: TEMAT
              - name: "form_message_label_pl"
                label: "💬 Etykieta pola: Wiadomość"
                widget: "string"
                required: false
                default: "TREŚĆ WIADOMOŚCI"
                pattern: ['^.{0,100}$', "❌ Maksymalnie 100 znaków"]
                hint: >
                  📍 Gdzie: etykieta pola tekstowego wiadomości.
                  ⚠️ Ważne: max 100 znaków.
                  ✏️ Przykład: TREŚĆ WIADOMOŚCI
              - name: "form_submit_label_pl"
                label: "🚀 Tekst przycisku wyślij"
                widget: "string"
                required: false
                default: "WYŚLIJ WIADOMOŚĆ"
                pattern: ['^.{0,80}$', "❌ Maksymalnie 80 znaków"]
                hint: >
                  📍 Gdzie: główny przycisk formularza na /kontakt.
                  ⚠️ Ważne: max 80 znaków. Strona automatycznie doda strzałkę.
                  ✏️ Przykład: WYŚLIJ WIADOMOŚĆ
              - name: "form_success_pl"
                label: "✅ Komunikat sukcesu"
                widget: "string"
                required: false
                default: "Dziękujemy! Odpowiemy w ciągu 24 godzin."
                pattern: ['^.{0,180}$', "❌ Maksymalnie 180 znaków"]
                hint: >
                  📍 Gdzie: tekst po poprawnym wysłaniu formularza.
                  ⚠️ Ważne: krótko, uspokajająco, konkretnie.
                  ✏️ Przykład: Dziękujemy! Odpowiemy w ciągu 24 godzin.
              - name: "form_error_pl"
                label: "❌ Komunikat błędu"
                widget: "string"
                required: false
                default: "Nie udało się wysłać formularza. Spróbuj ponownie za chwilę."
                pattern: ['^.{0,180}$', "❌ Maksymalnie 180 znaków"]
                hint: >
                  📍 Gdzie: tekst po nieudanym wysłaniu formularza.
                  ⚠️ Ważne: bez technicznych szczegółów i kodów błędów.
                  ✏️ Przykład: Nie udało się wysłać formularza. Spróbuj ponownie za chwilę.
              - name: "form_subject_options_pl"
                label: "📚 Lista opcji tematu (CSV)"
                widget: "string"
                required: false
                default: "Rejestracja,Sponsorowanie,Patronat medialny,Instruktorzy,Prasa i media,Inne"
                pattern: ['^.{0,300}$', "❌ Maksymalnie 300 znaków"]
                hint: >
                  📍 Gdzie: opcje listy „Temat” w formularzu.
                  ⚠️ Ważne: oddzielaj opcje przecinkiem, bez średników.
                  ✏️ Przykład: Rejestracja,Sponsorowanie,Patronat medialny,Instruktorzy,Prasa i media,Inne
              - name: "section_media_title_pl"
                label: "🎙️ Tytuł sekcji kontaktowej (media)"
                widget: "string"
                required: false
                default: "BEZPOŚREDNI KONTAKT"
                pattern: ['^.{0,120}$', "❌ Maksymalnie 120 znaków"]
                hint: >
                  📍 Gdzie: nagłówek karty z adresami e-mail/telefonami na /kontakt.
                  ⚠️ Ważne: max 120 znaków.
                  ✏️ Przykład: BEZPOŚREDNI KONTAKT
              - name: "section_partnership_title_pl"
                label: "🤝 Tytuł sekcji partnerskiej (rezerwa)"
                widget: "string"
                required: false
                default: "Zostań partnerem"
                pattern: ['^.{0,120}$', "❌ Maksymalnie 120 znaków"]
                hint: >
                  📍 Gdzie: pole przygotowane pod sekcję partnerską kontaktu.
                  ⚠️ Ważne: obecnie nie wpływa na wygląd strony.
                  ✏️ Przykład: Zostań partnerem
