backend:
  name: "github"
  repo: "sebastianmlk9academy/cerberus-k9-website"
  branch: "master"
  base_url: "https://cerberus-oauth-proxy.vercel.app"
  auth_endpoint: "/auth"
publish_mode: "editorial_workflow"
media_folder: "public/uploads"
public_folder: "/uploads"
locale: "pl"
collections:
  - name: _start
    label: "👋 Zacznij tutaj — Instrukcja"
    description: "Przeczytaj zanim cokolwiek zmienisz. Instrukcja obsługi CMS."
    files:
      - name: instrukcja
        label: "📖 Instrukcja obsługi CMS"
        file: src/content/_instrukcja.md
        fields:
          - name: body
            label: "📝 Treść instrukcji"
            widget: markdown
            hint: >
              📍 Gdzie: treść widoczna tylko w panelu CMS (plik _instrukcja) — przewodnik dla redaktorów.
              ✏️ Edytuj markdown, aby opisać workflow publikacji i zasady treści.
  - name: "ustawienia_globalne"
    label: "⚙️ Ustawienia Globalne"
    description: "Główne ustawienia całej strony — data wydarzenia, liczby, linki, social media."
    files:
      - name: "ustawienia"
        label: "📄 Plik ustawień"
        file: "src/content/ustawienia.yml"
        format: "yaml"
        fields:
          - name: "sekcja_wydarzenie"
            label: "📅 Wydarzenie (data, miejsce, strefa)"
            widget: "object"
            collapsed: false
            fields:
              - name: "event_date"
                label: "📅 Data startu wydarzenia"
                widget: "datetime"
                hint: "Używana w odliczaniu na stronie głównej i w JSON-LD wydarzenia."
                required: true
                format: "YYYY-MM-DD"
                date_format: "DD.MM.YYYY"
                time_format: false
              - name: "event_date_end"
                label: "📅 Data końca wydarzenia"
                widget: "datetime"
                hint: "Data zakończenia — JSON-LD i nagłówki agendy."
                required: true
                format: "YYYY-MM-DD"
                date_format: "DD.MM.YYYY"
                time_format: false
              - name: "event_city"
                label: "🏙️ Miasto wydarzenia"
                widget: "string"
                hint: "Miasto w schemacie wydarzenia i treściach kontaktowych."
                required: true
              - name: "event_venue"
                label: "🏟️ Główna lokalizacja (nazwa)"
                widget: "string"
                hint: "Nazwa miejsca w JSON-LD i komunikatach."
                required: true
              - name: "event_time_start"
                label: "⏰ Godzina startu (HH:MM)"
                widget: "string"
                hint: "Start pierwszego dnia — licznik czasu na stronie głównej."
                required: true
                default: "09:00"
                pattern:
                  - "^\\d{2}:\\d{2}$"
                  - "Format 24h np. 09:00"
              - name: "event_time_end"
                label: "⏰ Godzina końca (HH:MM)"
                widget: "string"
                hint: "Koniec ostatniego dnia — metadane wydarzenia."
                required: true
                default: "18:00"
                pattern:
                  - "^\\d{2}:\\d{2}$"
                  - "Format 24h np. 18:00"
              - name: "event_timezone"
                label: "🌍 Strefa czasowa (IANA)"
                widget: "string"
                hint: "Strefa odliczania hero; np. Europe/Warsaw."
                required: false
                default: "Europe/Warsaw"

          - name: "sekcja_hero"
            label: "🦁 Hero strony głównej"
            widget: "object"
            collapsed: false
            fields:
              - name: "hero_tagline"
                label: "✨ Tekst nad tytułem (tag-line)"
                widget: "string"
                hint: >
                  📍 Gdzie: czerwona linia nad dużym nagłówkiem hero na stronie głównej (/ i /[lang]).
                  ✏️ Np. MIĘDZYNARODOWA PLATFORMA OBRONY — krótki, wielkimi literami.
                required: false
              - name: "hero_title"
                label: "🦁 Pierwsza linia tytułu H1"
                widget: "string"
                hint: >
                  📍 Gdzie: pierwsza linia dużego nagłówka hero na stronie głównej.
                  ✏️ Np. CERBERUS — główna marka wydarzenia.
                required: false
                default: "CERBERUS"
              - name: "hero_subtitle"
                label: "🎯 Akcent w tytule (np. K9)"
                widget: "string"
                hint: "Drugie słowo w drugiej linii H1."
                required: false
                default: "K9"
              - name: "hero_year"
                label: "📆 Rok w nagłówku"
                widget: "string"
                hint: "Rok edycji przy drugiej linii H1."
                required: false
                default: "2026"
              - name: "hero_meta_locations"
                label: "📍 Meta hero — lokalizacje"
                widget: "text"
                hint: "Rezerwa pod spięcie trzech meta-bloków hero z CMS."
                required: false
              - name: "hero_meta_delegations"
                label: "🤝 Meta hero — delegacje"
                widget: "text"
                hint: "Rezerwa pod treść meta wiersza o delegacjach."
                required: false
              - name: "hero_meta_entry"
                label: "🎫 Meta hero — wejście"
                widget: "text"
                hint: "Rezerwa pod treść meta wiersza o wejściu/wstępie."
                required: false
              - name: "hero_background_image"
                label: "🖼️ Tło sekcji Hero"
                widget: "image"
                hint: "Zalecany format: WebP. Rozmiar: 1920×1080px. Tło za treścią hero na stronie głównej."
                required: false
                choose_url: true
              - name: "hero_background_opacity"
                label: "🌫️ Tło Hero — krycie"
                widget: "number"
                hint: "Nieprzezroczystość zdjęcia tła (0.1–1)."
                required: false
                default: 0.4
                min: 0.1
                max: 1
                step: 0.05
              - name: "registration_active"
                label: "✅ Rejestracja w menu i hero"
                widget: "boolean"
                hint: >
                  true = widoczny przycisk REJESTRACJA w pasku nawigacji oraz CTA rejestracji w sekcji hero na stronie głównej.
                  false = przyciski ukryte; linki w treściach zostają w pliku — nie usuwają wpisów.
                required: true
                default: true
              - name: "hero_cta_registration_href"
                label: "🔗 CTA hero — rejestracja"
                widget: "string"
                hint: >
                  📍 Gdzie: docelowy URL przycisku rejestracji w hero (gdy wypełnione ma pierwszeństwo przed /rejestracja).
                  ✏️ Wklej pełny adres z https:// — np. https://pretix.eu/... lub https://www.przyklad.pl
                required: false
                pattern: ['^$|^https?://|^/', "❌ Wklej pełny URL (https://...) lub ścieżkę zaczynającą się od / (np. /pl/rejestracja). Pole może być też puste."]
              - name: "hero_cta_program_href"
                label: "🔗 CTA hero — program"
                widget: "string"
                hint: "Link przycisku programu na hero."
                required: false
                default: "/pl/o-wydarzeniu#agenda"
              - name: "hero_video_href"
                label: "🎥 Hero — URL wideo (modal)"
                widget: "string"
                hint: "YouTube z przycisku relacji na hero."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "hero_video_title"
                label: "🎥 Hero — tytuł iframe"
                widget: "string"
                hint: "Tytuł dostępnościowy iframe wideo."
                required: false
              - name: "hero_close_label_pl"
                label: "❎ Hero — przycisk zamknięcia"
                widget: "string"
                hint: "Etykieta zamykania modala wideo."
                required: false
                default: "ZAMKNIJ"
              - name: "hero_video_url"
                label: "🎥 Hero wideo (legacy)"
                widget: "string"
                hint: "Starsze pole — kompatybilność."
                required: false

          - name: "sekcja_statystyki"
            label: "📊 Statystyki (liczby na stronie głównej)"
            widget: "object"
            collapsed: true
            fields:
              - name: "participants_count"
                label: "👥 Uczestnicy (tekst statystyki)"
                widget: "string"
                hint: "Wartość w pasku statystyk gdy brak wpisów homepage_stats."
                required: true
                default: "250+"
              - name: "countries_count"
                label: "🌐 Kraje (tekst statystyki)"
                widget: "string"
                hint: "Wartość w pasku statystyk — fallback."
                required: true
                default: "15+"
              - name: "dogs_count"
                label: "🐕 Psy K9 (tekst)"
                widget: "string"
                hint: "Tekst liczby psów w statystykach."
                required: true
                default: "80+"
              - name: "modules_count"
                label: "📚 Moduły (tekst)"
                widget: "string"
                hint: "Tekst liczby modułów w statystykach."
                required: true
                default: "8"
              - name: "participants_registered"
                label: "🔢 Zarejestrowani (liczba)"
                widget: "number"
                hint: "Opcjonalna liczba pod kampanie lub banery po podpięciu."
                required: false
                value_type: "int"
                min: 0
                max: 100000
                default: 0
              - name: "grants_approved"
                label: "💶 Zatwierdzone dotacje (liczba)"
                widget: "number"
                hint: "Opcjonalnie pod banery grantowe."
                required: false
                value_type: "int"
                min: 0
                default: 0
              - name: "volunteers_count"
                label: "🙋 Wolontariusze (liczba)"
                widget: "number"
                hint: "Liczba wolontariuszy po podpięciu UI."
                required: false
                value_type: "int"
                min: 0
                default: 0

          - name: "sekcja_wideo"
            label: "🎬 Wideo (strona główna + fallback galerii)"
            widget: "object"
            collapsed: true
            fields:
              - name: "main_video_youtube"
                label: "🎬 Główne wideo YouTube"
                widget: "string"
                hint: "Główny film w sekcji wideo na stronie głównej."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "main_video_title"
                label: "🎬 Tytuł głównego wideo"
                widget: "string"
                hint: "Tytuł przy odtwarzaczu głównym."
                required: false
              - name: "video_url_2"
                label: "🎬 Wideo 2 — URL"
                widget: "string"
                hint: "Drugi film w siatce wideo."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "video_badge_2"
                label: "🏷️ Wideo 2 — odznaka"
                widget: "string"
                hint: "Etykieta przy drugim filmie."
                required: false
              - name: "video_url_3"
                label: "🎬 Wideo 3 — URL"
                widget: "string"
                hint: "Trzeci film w siatce."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "video_badge_3"
                label: "🏷️ Wideo 3 — odznaka"
                widget: "string"
                hint: "Etykieta przy trzecim filmie."
                required: false
              - name: "video_url_4"
                label: "🎬 Wideo 4 — URL"
                widget: "string"
                hint: "Czwarty film (dolny rząd)."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "video_badge_4"
                label: "🏷️ Wideo 4 — odznaka"
                widget: "string"
                hint: "Etykieta przy czwartym filmie."
                required: false
              - name: "video_badge_1"
                label: "🏷️ Główne wideo — odznaka"
                widget: "string"
                hint: "Linia tekstu nad głównym odtwarzaczem."
                required: false
              - name: "gallery_video_1_title"
                label: "🎬 Galeria wideo 1 — tytuł"
                widget: "string"
                hint: "Tytuł pierwszego wideo w galerii."
                required: false
              - name: "gallery_video_1_url"
                label: "🎬 Galeria wideo 1 — URL"
                widget: "string"
                hint: "Link pierwszego wideo w galerii."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "gallery_video_1_badge"
                label: "🏷️ Galeria wideo 1 — odznaka"
                widget: "string"
                hint: "Etykieta przy pierwszym wideo."
                required: false
              - name: "gallery_video_2_title"
                label: "🎬 Galeria wideo 2 — tytuł"
                widget: "string"
                hint: "Tytuł drugiego wideo w galerii."
                required: false
              - name: "gallery_video_2_url"
                label: "🎬 Galeria wideo 2 — URL"
                widget: "string"
                hint: "Link drugiego wideo."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "gallery_video_2_badge"
                label: "🏷️ Galeria wideo 2 — odznaka"
                widget: "string"
                hint: "Etykieta przy drugim wideo."
                required: false
              - name: "gallery_video_3_title"
                label: "🎬 Galeria wideo 3 — tytuł"
                widget: "string"
                hint: "Tytuł trzeciego wideo."
                required: false
              - name: "gallery_video_3_url"
                label: "🎬 Galeria wideo 3 — URL"
                widget: "string"
                hint: "Link trzeciego wideo."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "gallery_video_3_badge"
                label: "🏷️ Galeria wideo 3 — odznaka"
                widget: "string"
                hint: "Etykieta przy trzecim wideo."
                required: false
              - name: "gallery_video_4_title"
                label: "🎬 Galeria wideo 4 — tytuł"
                widget: "string"
                hint: "Tytuł czwartego wideo."
                required: false
              - name: "gallery_video_4_url"
                label: "🎬 Galeria wideo 4 — URL"
                widget: "string"
                hint: "Link czwartego wideo."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "gallery_video_4_badge"
                label: "🏷️ Galeria wideo 4 — odznaka"
                widget: "string"
                hint: "Etykieta przy czwartym wideo."
                required: false

          - name: "sekcja_rejestracja"
            label: "🎟️ Rejestracja i partner CTA"
            widget: "object"
            collapsed: true
            fields:
              - name: "pretix_url"
                label: "🎟️ URL sklepu Pretix"
                widget: "string"
                hint: "Rejestracja — przyciski i embed na /rejestracja."
                required: true
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "registration_deadline_text"
                label: "⏳ Deadline rejestracji (tekst)"
                widget: "string"
                hint: "Tekst terminu zapisów w panelu rejestracji."
                required: false
              - name: "registration_date_display"
                label: "📅 Rejestracja — wyświetlany termin"
                widget: "string"
                hint: "Termin obok widgetu Pretix."
                required: false
              - name: "registration_prep_day"
                label: "📅 Dzień przygotowawczy"
                widget: "string"
                hint: "Tekst dnia przygotowawczego przy rejestracji."
                required: false
              - name: "registration_venues"
                label: "🏟️ Lokalizacje (tekst)"
                widget: "string"
                hint: "Lista miejsc przy panelu rejestracji."
                required: false
              - name: "registration_city"
                label: "🏙️ Miasto (rejestracja)"
                widget: "string"
                hint: "Miasto przy danych rejestracyjnych."
                required: false
              - name: "registration_contact_email"
                label: "✉️ E-mail do rejestracji"
                widget: "string"
                hint: "Kontakt przy pytaniach o zapisy."
                required: false
              - name: "registration_contact_phone"
                label: "📞 Telefon do rejestracji"
                widget: "string"
                hint: "Telefon przy pytaniach o zapisy."
                required: false
              - name: "partner_cta_href"
                label: "🤝 CTA „Zostań partnerem”"
                widget: "string"
                hint: "Link w sekcji partnerów na stronie głównej."
                required: false
              - name: "partner_cta_href_full"
                label: "🔗 CTA partner — URL pełny"
                widget: "string"
                hint: "Alternatywny pełny link CTA."
                required: false
              - name: "accreditation_deadline"
                label: "📅 Deadline akredytacji mediów"
                widget: "string"
                hint: "Termin zgłoszeń akredytacyjnych."
                required: false

          - name: "sekcja_live"
            label: "🔴 Tryb LIVE i powiadomienia"
            widget: "object"
            collapsed: true
            fields:
              - name: "live_mode_active"
                label: "🔴 Tryb LIVE"
                widget: "boolean"
                hint: "true = widoczny dla odwiedzających, false = ukryty. Wpis zostaje zapisany."
                required: false
                default: false
              - name: "current_competitor"
                label: "🏅 Aktualny uczestnik (LIVE)"
                widget: "string"
                hint: "Tekst relacji na żywo po podpięciu UI."
                required: false
              - name: "notification_bar_active"
                label: "📣 Pasek powiadomień"
                widget: "boolean"
                hint: "true = widoczny dla odwiedzających, false = ukryty. Wpis zostaje zapisany."
                required: false
                default: false
              - name: "notification_bar_text"
                label: "📣 Tekst paska"
                widget: "string"
                hint: "Treść paska nad stroną gdy aktywny."
                required: false
              - name: "notification_bar_url"
                label: "📣 Link paska"
                widget: "string"
                hint: "URL po kliknięciu paska; Wklej pełny adres URL z https://"
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "gallery_unlock_date"
                label: "🔓 Data odblokowania galerii"
                widget: "datetime"
                hint: "Po tej dacie widoczna galeria edycji bieżącej na /galeria."
                required: false
                format: "YYYY-MM-DD"
                date_format: "DD.MM.YYYY"
                time_format: false

          - name: "sekcja_social"
            label: "🌐 Social media"
            widget: "object"
            collapsed: true
            fields:
              - name: "social_facebook"
                label: "📘 Facebook URL"
                widget: "string"
                hint: "Ikona Facebook w stopce."
                required: true
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "social_youtube"
                label: "📺 YouTube URL"
                widget: "string"
                hint: "Ikona YouTube w stopce."
                required: true
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "social_instagram"
                label: "📸 Instagram URL"
                widget: "string"
                hint: "Ikona Instagram w stopce; puste = fallback."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "social_linkedin"
                label: "💼 LinkedIn URL"
                widget: "string"
                hint: "Ikona LinkedIn w stopce."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "social_twitter"
                label: "🐦 X / Twitter URL"
                widget: "string"
                hint: "Ikona X w stopce."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
              - name: "twitter_handle"
                label: "🐦 Handle X (meta)"
                widget: "string"
                hint: "Twitter Card — handle."
                required: false
                default: "@cerberusk9"

          - name: "sekcja_kontakt"
            label: "✉️ Stopka, kontakt, media, sponsor"
            widget: "object"
            collapsed: true
            fields:
              - name: "footer_email"
                label: "✉️ E-mail w stopce"
                widget: "string"
                hint: "Kontakt w stopce każdej podstrony."
                required: true
              - name: "footer_phone"
                label: "📞 Telefon w stopce"
                widget: "string"
                hint: "Telefon w stopce i blokach kontaktowych."
                required: true
              - name: "footer_address"
                label: "🏠 Adres fundacji"
                widget: "string"
                hint: "Adres w stopce i danych prawnych."
                required: true
              - name: "footer_foundation_name"
                label: "🏛️ Nazwa fundacji"
                widget: "string"
                hint: "Nazwa organizacji w stopce."
                required: true
              - name: "footer_domains"
                label: "🌐 Domeny (tekst stopki)"
                widget: "string"
                hint: "Lista domen w stopce."
                required: false
              - name: "media_contact_name"
                label: "👤 Kontakt media — nazwa"
                widget: "string"
                hint: "Blok dla mediów na /media."
                required: false
              - name: "media_contact_phone"
                label: "📞 Kontakt media — telefon"
                widget: "string"
                hint: "Telefon dla dziennikarzy."
                required: false
              - name: "media_contact_email"
                label: "✉️ Kontakt media — e-mail"
                widget: "string"
                hint: "E-mail akredytacji."
                required: false
              - name: "president_email"
                label: "✉️ E-mail prezesa"
                widget: "string"
                hint: "Kontakt do prezesa fundacji."
                required: false
              - name: "press_kit_zip"
                label: "🗜️ Press kit (ZIP URL)"
                widget: "string"
                hint: "Archiwum materiałów prasowych /media."
                required: false
              - name: "press_pdf_polska_zbrojna"
                label: "📰 PDF Polska Zbrojna"
                widget: "string"
                hint: "Link do artykułu PDF."
                required: false
              - name: "press_pdf_special_ops"
                label: "📰 PDF Special Ops"
                widget: "string"
                hint: "Link do artykułu PDF."
                required: false
              - name: "sponsor_offer_pdf"
                label: "📎 Oferta sponsorska (PDF)"
                widget: "string"
                hint: "PDF oferty dla sponsorów /partnerzy."
                required: false
              - name: "sponsor_contact_email"
                label: "✉️ E-mail sponsoring"
                widget: "string"
                hint: "Kontakt ds. sponsorowania."
                required: false
              - name: "contact_map_embed_url"
                label: "🗺️ Kontakt — embed mapy"
                widget: "string"
                hint: "Iframe mapy na /kontakt."
                required: false
                pattern:
                  - "^https?://.*"
                  - "Wklej pełny adres URL z https://"
