      - { name: "day", label: "Dzie?", widget: "string", hint: "📍 Gdzie: /o-wydarzeniu → zakładka Dzień 1 lub Dzień 2. ⚠️ Format: RRRR-MM-DD. ✏️ Przykład: 2026-06-13 (Dzień 1) lub 2026-06-14 (Dzień 2)" }
      - { name: "time_start", label: "Godzina startu", widget: "string", pattern: ["^([01]\\d|2[0-3]):[0-5]\\d$", "Format HH:MM, np. 09:00"], hint: "📍 Gdzie: /o-wydarzeniu → godzina startu na osi czasu. ⚠️ Format HH:MM — dokładnie 5 znaków z dwukropkiem. ✏️ Przykład: 09:00" }
      - { name: "time_end", label: "Godzina ko?ca", widget: "string", pattern: ["^([01]\\d|2[0-3]):[0-5]\\d$", "Format HH:MM, np. 09:00"], hint: "📍 Gdzie: /o-wydarzeniu → godzina końca na osi czasu. ⚠️ Format HH:MM. Musi być późniejsza niż time_start. ✏️ Przykład: 12:30" }
