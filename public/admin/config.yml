    public_folder: "/uploads/press"
    fields:
      - label: "📝 Nazwa pakietu"
        name: "title"
        widget: "string"
        required: true
        hint: "📍 Lista pakietów na stronie /media."
      - label: "📋 Opis zawartości"
        name: "description"
        widget: "text"
        required: false
        hint: "✏️ Np. 45 zdjęć z ceremonii otwarcia"
      - name: "preview_image"
        label: "🖼️ Miniatura pakietu"
        widget: "image"
        required: false
        choose_url: true
        hint: "Podgląd na stronie /media. WebP 600x400px."
      - name: "download_url"
        label: "🔗 Link do pobrania (ZIP)"
        widget: "string"
        required: true
        hint: >
          URL do archiwum ZIP.
          ✏️ Google Drive, Dropbox lub plik na serwerze.
          ⚠️ Musi zaczynać się od https://
      - label: "🔢 Liczba zdjęć"
        name: "photo_count"
        widget: "number"
        value_type: "int"
        min: 1
        required: false
      - label: "💾 Rozmiar pliku"
        name: "file_size"
        widget: "string"
        required: false
        hint: "✏️ Np. 245 MB lub 1.2 GB"
      - label: "📷 Autor / Fotograf"
        name: "author"
        widget: "string"
        required: false
        hint: "Imię autora — ważne dla praw autorskich."
      - name: "license"
        label: "⚖️ Licencja"
        widget: "select"
        default: "press_only"
        options:
          - { label: "Tylko dla akredytowanych mediów", value: "press_only" }
          - { label: "Swobodne z podaniem źródła", value: "cc_attribution" }
          - { label: "Tylko użytek wewnętrzny", value: "internal" }
      - name: "edition"
        label: "📅 Edycja"
        widget: "relation"
        collection: "gallery_editions"
        search_fields: ["label_pl", "value"]
        value_field: "value"
        display_fields: ["label_pl"]
        required: false
        hint: "Edycja której dotyczą zdjęcia."
      - label: "🔢 Kolejność"
        name: "order"
        widget: "number"
        default: 10
      - label: "👁️ Dostępny"
        name: "active"
        widget: "boolean"
        default: true

