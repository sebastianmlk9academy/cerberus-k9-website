  - name: "instruktorzy"
    label: "🎖️ Instruktorzy — Profile"
    description: "Karty instruktorów: zdjęcie, kraj, specjalizacje, bio. Dodaj wpis = nowa karta na /instruktorzy."
    preview_path: "/pl/instruktorzy"
    media_folder: "public/uploads/instruktorzy"
    public_folder: "/uploads/instruktorzy"
    folder: "src/content/instruktorzy"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    extension: "md"
    format: "frontmatter"
    fields:
      - name: "name"
        label: "✒️ Imię i nazwisko"
        widget: "string"
        hint: >
          📍 Gdzie: główny tytuł karty instruktora na stronie /instruktorzy.
          ✏️ Np. Jan Kowalski.
        required: true
      - name: "role"
        label: "⭐ Rola / stanowisko"
        widget: "string"
        hint: >
          📍 Gdzie: podtytuł pod nazwiskiem na karcie /instruktorzy.
          ✏️ Np. Instruktor taktyczny K9.
        required: false
      - name: "countryCode"
        label: "🏴 Kod kraju ISO"
        widget: "string"
        hint: >
          📍 Gdzie: flaga i sortowanie na /instruktorzy — kod ISO 3166-1 alpha-2 (2 litery).
          ✏️ Np. PL, DE, US.
        required: true
      - name: "country"
        label: "🌍 Kraj (nazwa)"
        widget: "string"
        hint: >
          📍 Gdzie: pełna nazwa kraju na karcie instruktora (fallback przy braku tłumaczenia z kodu).
          ✏️ Np. Polska.
        required: true
      - name: "specializations"
        label: "🎯 Specjalizacje instruktora"
        widget: "list"
        required: true
        hint: >
          📍 Gdzie: tagi na karcie i filtry na /instruktorzy.
          ⚠️ Format: WebP nie dotyczy — wybieraj klucze z relacji; max rozmiar listy wg potrzeb.
          Nowe specjalizacje dodaj w kolekcji „Filtry Instruktorów”.
        field:
          name: spec
          label: "🔗 Specjalizacja (relacja)"
          widget: relation
          collection: instructor_filters
          search_fields: [label_pl, key]
          value_field: key
          display_fields: [label_pl]
      - name: "photo"
        label: "📸 Zdjęcie portretowe"
        widget: "image"
        hint: >
          📍 Gdzie: zdjęcie na karcie instruktora na /instruktorzy.
          ⚠️ Format: WebP, ok. 800×800px, max 300KB.
        required: true
        choose_url: true
      - name: "bioShort"
        label: "📄 Bio krótkie"
        widget: "text"
        hint: >
          📍 Gdzie: skrócony opis na karcie (lista /instruktorzy) — max 200 znaków.
          ✏️ Zdanie lub dwa o doświadczeniu.
        required: true
        pattern:
          - "^.{1,200}$"
          - "Maksymalnie 200 znaków"
      - name: "bioFull"
        label: "📖 Bio pełne"
        widget: "markdown"
        hint: >
          📍 Gdzie: pełna biografia po rozwinięciu „czytaj więcej” na /instruktorzy.
          ✏️ Markdown: akapity, listy, linki.
        required: true
      - name: "unit"
        label: "🛡️ Jednostka / formacja"
        widget: "string"
        hint: "📍 Gdzie: opcjonalna linia pod rolami na karcie. ✏️ Np. JWK."
        required: false
      - name: "module"
        label: "📚 Moduł szkoleniowy"
        widget: "string"
        hint: "📍 Gdzie: moduł przypisany do instruktora na karcie. ✏️ Np. TCCC podstawowy."
        required: false
      - name: "schedule"
        label: "📅 Harmonogram"
        widget: "string"
        hint: "📍 Gdzie: opcjonalne terminy/bloki na karcie instruktora."
        required: false
      - name: "languages"
        label: "🗣️ Języki prowadzenia"
        widget: "string"
        hint: "📍 Gdzie: lista języków na karcie. ✏️ Np. Polski, Angielski."
        required: false
        default: "Polski"
      - label: "👤 Typ uczestnika"
        name: "type"
        widget: "select"
        required: false
        default: "Instruktor"
        hint: >
          📍 Gdzie: etykieta typu na karcie /instruktorzy.
          ✏️ Wybierz rolę w programie wydarzenia.
        options:
          - { label: "🎓 Instruktor", value: "Instruktor" }
          - { label: "🎭 Pozorant", value: "Pozorant" }
          - { label: "👥 Lider grupy", value: "Lider Grupy" }
          - { label: "🎤 Prelegent", value: "Prelegent" }
          - { label: "⭐ VIP", value: "VIP" }
      - name: "linkedinUrl"
        label: "🔗 Profil LinkedIn"
        widget: "string"
        hint: >
