backend:
  name: "github"
  repo: "sebastianmlk9academy/cerberus-k9-website"
  branch: "master"
  base_url: "https://cerberus-oauth-proxy.vercel.app"
  auth_endpoint: "/auth"
publish_mode: "editorial_workflow"
media_folder: "public/uploads"
public_folder: "/uploads"
locale: "pl"
collections:
  - name: _start
    label: "👋 Zacznij tutaj — Instrukcja"
    description: "Przeczytaj zanim cokolwiek zmienisz. Instrukcja obsługi CMS."
    files:
      - name: instrukcja
        label: "📖 Instrukcja obsługi CMS"
        file: src/content/_instrukcja.md
        fields:
          - name: body
            label: "📝 Treść instrukcji"
            widget: markdown
            hint: >
              📍 Gdzie: treść widoczna tylko w panelu CMS (plik _instrukcja) — przewodnik dla redaktorów.
              ✏️ Edytuj markdown, aby opisać workflow publikacji i zasady treści.
  - name: "ustawienia_globalne"
    label: "⚙️ Ustawienia Globalne"
    description: "Główne ustawienia całej strony — data wydarzenia, liczby, linki, social media."
    files:
      - name: "ustawienia"
        label: "📄 Plik ustawień"
        file: "src/content/ustawienia.yml"
        format: "yaml"
        fields:
          - name: "sekcja_wydarzenie"
            label: "📅 Wydarzenie (data, miejsce, strefa)"
            widget: "object"
            collapsed: false
            fields:
              - name: "event_date"
                label: "📅 Data startu wydarzenia"
                widget: "datetime"
                hint: "📍 Gdzie: cała strona → odliczanie, stopka, JSON-LD. ⚠️ Format: RRRR-MM-DD. ✏️ Przykład: 2026-06-13"
                required: true
                format: "YYYY-MM-DD"
                date_format: "DD.MM.YYYY"
                time_format: false
              - name: "event_date_end"
                label: "📅 Data końca wydarzenia"
                widget: "datetime"
                hint: "📍 Gdzie: cała strona → meta daty, stopka. ⚠️ Musi być późniejsza niż event_date. ✏️ Przykład: 2026-06-14"
                required: true
                format: "YYYY-MM-DD"
                date_format: "DD.MM.YYYY"
                time_format: false
              - name: "event_city"
                label: "🏙️ Miasto wydarzenia"
                widget: "string"
                hint: "📍 Gdzie: strona główna → Hero, stopka, SEO. ⚠️ Max 30 znaków. ✏️ Przykład: Ostrów Wielkopolski"
                required: true
              - name: "event_venue"
                label: "🏟️ Główna lokalizacja (nazwa)"
                widget: "string"
                hint: "📍 Gdzie: strona główna → Hero, /strefa-uczestnika. ⚠️ Max 30 znaków. ✏️ Przykład: 3MK Arena"
                required: true
              - name: "event_time_start"
                label: "⏰ Godzina startu (HH:MM)"
                widget: "string"
                hint: "Start pierwszego dnia — licznik czasu na stronie głównej."
                required: true
                default: "09:00"
                pattern:
                  - "^([01]\\d|2[0-3]):[0-5]\\d$"
                  - "Format HH:MM, np. 09:00"
              - name: "event_time_end"
                label: "⏰ Godzina końca (HH:MM)"
                widget: "string"
                hint: "Koniec ostatniego dnia — metadane wydarzenia."
                required: true
                default: "18:00"
                pattern:
                  - "^([01]\\d|2[0-3]):[0-5]\\d$"
                  - "Format HH:MM, np. 09:00"
              - name: "event_timezone"
                label: "🌍 Strefa czasowa (IANA)"
                widget: "string"
                hint: "Strefa odliczania hero; np. Europe/Warsaw."
                required: false
                default: "Europe/Warsaw"

          - name: "sekcja_hero"
            label: "🦁 Hero strony głównej"
            widget: "object"
            collapsed: false
            fields:
              - name: "hero_tagline"
                label: "✨ Tagline nad tytułem hero"
                widget: "string"
                required: false
                default: "MIĘDZYNARODOWE ĆWICZENIA K9 · EDYCJA 2026"
                pattern: ['^.{0,120}$', "❌ Maksymalnie 120 znaków"]
                hint: >
                  📍 Gdzie: małe litery nad 'CERBERUS K9' na stronie głównej, widoczne od razu po wejściu na stronę.
                  ⚠️ Ważne: max 120 znaków — dłuższy tekst może się źle łamać na małych ekranach.
                  ✏️ Przykład: MIĘDZYNARODOWE ĆWICZENIA K9 · EDYCJA 2026
              - name: "hero_subline_pl"
                label: "📝 Podlinia hero — tekst PL (np. WSTĘP BEZPŁATNY)"
                widget: "string"
                required: false
                default: "WSTĘP BEZPŁATNY · REJESTRACJA WYMAGANA"
                pattern: ['^.{0,100}$', "❌ Maksymalnie 100 znaków"]
                hint: >
                  📍 Gdzie: tekst pod głównym tytułem CERBERUS K9 na stronie głównej.
                  ⚠️ Ważne: max 100 znaków. Używaj separatora · (Alt+0183).
                  ✏️ Przykład: WSTĘP BEZPŁATNY · REJESTRACJA WYMAGANA
              - name: "hero_title"
                label: "🦁 Pierwsza linia tytułu H1"
                widget: "string"
                hint: "📍 Gdzie: strona główna → Hero, duży napis na górze. ⚠️ Max 10 znaków, WIELKIE LITERY. ✏️ Przykład: CERBERUS"
                required: false
                default: "CERBERUS"
              - name: "hero_subtitle"
                label: "🎯 Akcent w tytule (np. K9)"
                widget: "string"
                hint: "📍 Gdzie: strona główna → Hero, czerwony napis obok tytułu. ⚠️ Max 5 znaków. ✏️ Przykład: K9"
                required: false
                default: "K9"
              - name: "hero_year"
                label: "📆 Rok w nagłówku"
                widget: "string"
                hint: "📍 Gdzie: strona główna → Hero, rok przy tytule. ⚠️ 4 cyfry. ✏️ Przykład: 2026"
                required: false
                default: "2026"
              - name: "hero_meta_locations"
                label: "📍 Meta hero — lokalizacje"
                widget: "text"
                hint: "Pole rezerwowe (obecnie nieużywane w UI). Możesz zostawić puste."
                required: false
              - name: "hero_meta_delegations"
                label: "🤝 Meta hero — delegacje"
                widget: "text"
                hint: "Pole rezerwowe (obecnie nieużywane w UI). Możesz zostawić puste."
                required: false
              - name: "hero_meta_entry"
                label: "🎫 Meta hero — wejście"
                widget: "text"
                hint: "Pole rezerwowe (obecnie nieużywane w UI). Możesz zostawić puste."
                required: false
              - name: "pagehero_media_category_pl"
                label: "📰 PageHero (Media) — kategoria PL"
                widget: "string"
                required: false
                hint: "Nagłówek górny na /pl/media."
              - name: "pagehero_media_title_pl"
                label: "📰 PageHero (Media) — tytuł PL"
                widget: "string"
                required: false
                hint: "Główny tytuł na /pl/media."
              - name: "pagehero_media_subtitle_pl"
                label: "📰 PageHero (Media) — podtytuł PL"
                widget: "string"
                required: false
                hint: "Podtytuł na /pl/media."
              - name: "pagehero_gallery_category_pl"
                label: "🖼️ PageHero (Galeria) — kategoria PL"
                widget: "string"
                required: false
                hint: "Nagłówek górny na /pl/galeria."
              - name: "pagehero_gallery_title_pl"
                label: "🖼️ PageHero (Galeria) — tytuł PL"
                widget: "string"
                required: false
                hint: "Główny tytuł na /pl/galeria."
              - name: "pagehero_gallery_subtitle_pl"
                label: "🖼️ PageHero (Galeria) — podtytuł PL"
                widget: "string"
                required: false
                hint: "Podtytuł na /pl/galeria."
              - name: "pagehero_instructors_category_pl"
                label: "🎓 PageHero (Instruktorzy) — kategoria PL"
                widget: "string"
                required: false
                hint: "Nagłówek górny na /pl/instruktorzy."
              - name: "pagehero_instructors_title_pl"
                label: "🎓 PageHero (Instruktorzy) — tytuł PL"
                widget: "string"
                required: false
                hint: "Główny tytuł na /pl/instruktorzy."
              - name: "pagehero_instructors_subtitle_pl"
                label: "🎓 PageHero (Instruktorzy) — podtytuł PL"
                widget: "string"
                required: false
                hint: "Podtytuł na /pl/instruktorzy."
              - name: "pagehero_partners_category_pl"
                label: "🤝 PageHero (Partnerzy) — kategoria PL"
                widget: "string"
                required: false
                hint: "Nagłówek górny na /pl/partnerzy."
              - name: "pagehero_partners_title_pl"
                label: "🤝 PageHero (Partnerzy) — tytuł PL"
                widget: "string"
                required: false
                hint: "Główny tytuł na /pl/partnerzy."
              - name: "pagehero_partners_subtitle_pl"
                label: "🤝 PageHero (Partnerzy) — podtytuł PL"
                widget: "string"
                required: false
                hint: "Podtytuł na /pl/partnerzy."
              - name: "pagehero_contact_category_pl"
                label: "📞 PageHero (Kontakt) — kategoria PL"
                widget: "string"
                required: false
                hint: "Nagłówek górny na /pl/kontakt."
              - name: "pagehero_contact_title_pl"
                label: "📞 PageHero (Kontakt) — tytuł PL"
                widget: "string"
                required: false
                hint: "Główny tytuł na /pl/kontakt."
              - name: "pagehero_contact_subtitle_pl"
                label: "📞 PageHero (Kontakt) — podtytuł PL"
                widget: "string"
                required: false
                hint: "Podtytuł na /pl/kontakt."
              - name: "pagehero_registration_category_pl"
                label: "📝 PageHero (Rejestracja) — kategoria PL"
                widget: "string"
                required: false
                hint: "Nagłówek górny na /pl/rejestracja."
              - name: "pagehero_registration_title_pl"
                label: "📝 PageHero (Rejestracja) — tytuł PL"
                widget: "string"
                required: false
                hint: "Główny tytuł na /pl/rejestracja."
              - name: "pagehero_registration_subtitle_pl"
                label: "📝 PageHero (Rejestracja) — podtytuł PL"
                widget: "string"
                required: false
                hint: "Podtytuł na /pl/rejestracja."
              - name: "pagehero_news_category_pl"
                label: "🗞️ PageHero (Aktualności) — kategoria PL"
                widget: "string"
                required: false
                hint: "Nagłówek górny na /pl/aktualnosci."
              - name: "pagehero_news_title_pl"
                label: "🗞️ PageHero (Aktualności) — tytuł PL"
                widget: "string"
                required: false
                hint: "Główny tytuł na /pl/aktualnosci."
              - name: "pagehero_news_subtitle_pl"
                label: "🗞️ PageHero (Aktualności) — podtytuł PL"
                widget: "string"
                required: false
                hint: "Podtytuł na /pl/aktualnosci."
              - name: "pagehero_foundation_category_pl"
                label: "🏛️ PageHero (Fundacja) — kategoria PL"
                widget: "string"
                required: false
                hint: "Nagłówek górny na /pl/fundacja."
              - name: "pagehero_foundation_title_pl"
                label: "🏛️ PageHero (Fundacja) — tytuł PL"
                widget: "string"
                required: false
                hint: "Główny tytuł na /pl/fundacja."
              - name: "pagehero_foundation_subtitle_pl"
                label: "🏛️ PageHero (Fundacja) — podtytuł PL"
                widget: "string"
                required: false
                hint: "Podtytuł na /pl/fundacja."
              - name: "hero_background_image"
                label: "🖼️ Tło sekcji Hero"
                widget: "image"
                hint: "Zalecany format: WebP. Rozmiar: 1920×1080px. Tło za treścią hero na stronie głównej."
                required: false
                choose_url: true
              - name: "hero_background_opacity"
                label: "🌫️ Tło Hero — krycie"
                widget: "number"
                hint: "Nieprzezroczystość zdjęcia tła (0.1–1)."
                required: false
                default: 0.4
                min: 0.1
                max: 1
                step: 0.05
              - name: "registration_active"
                label: "✅ Rejestracja w menu i hero"
                widget: "boolean"
                hint: "📍 Gdzie: strona główna → przycisk REJESTRACJA, NavBar. ⚠️ Wyłącz gdy rejestracja zamknięta — przycisk zniknie ze strony. ✏️ TAK = rejestracja otwarta, NIE = zamknięta"
                required: true
                default: true
              - name: "mobile_sticky_cta_active"
                label: "Mobilny sticky CTA aktywny"
                widget: "boolean"
                default: false
                hint: "📍 Gdzie: telefony → czerwony przycisk przyklejony na dole ekranu. ⚠️ Włącz gdy rejestracja aktywna. Wyłącz gdy rejestracja zamknięta. ✏️ TAK = przycisk widoczny na telefonie"
              - name: "show_live_counter"
                label: "Licznik rejestracji aktywny"
                widget: "boolean"
                default: false
                required: false
                hint: "Włączone = licznik widoczny w HeroSection i odpytuje /data/registration-count.json"
              - name: "hero_cta_registration_href"
                label: "🔗 CTA hero — rejestracja"
                widget: "string"
                hint: >
                  📍 Gdzie: docelowy URL przycisku rejestracji w hero (gdy wypełnione ma pierwszeństwo przed /rejestracja).
                  ✏️ Wklej pełny adres z https:// — np. https://pretix.eu/... lub https://www.przyklad.pl
                required: false
                pattern: ['^$|^https?://|^/', "❌ Wklej pełny URL (https://...) lub ścieżkę zaczynającą się od / (np. /pl/rejestracja). Pole może być też puste."]
              - name: "hero_cta_program_href"
                label: "🔗 CTA hero — program"
                widget: "string"
                hint: "Link przycisku programu na hero."
                required: false
                default: "/pl/o-wydarzeniu#agenda"
              - name: "hero_video_href"
                label: "🎥 Hero — URL wideo (modal)"
                widget: "string"
                hint: "YouTube z przycisku relacji na hero."
                required: false
                pattern:
                  - "^https?://.+$"
                  - "Wklej pełny adres URL z https://"
              - name: "hero_video_title"
                label: "🎥 Hero — tytuł iframe"
                widget: "string"
                hint: "Tytuł dostępnościowy iframe wideo."
                required: false
              - name: "hero_close_label_pl"
                label: "❎ Hero — przycisk zamknięcia"
                widget: "string"
                hint: "Etykieta zamykania modala wideo."
                required: false
                default: "ZAMKNIJ"
              - name: "hero_video_url"
                label: "🎥 Hero wideo (legacy)"
                widget: "string"
                pattern:
                  - "^https?://.+$"
                  - "URL musi zaczyna? si? od https://"
                hint: "Pole legacy/rezerwa. Aktywne źródło to `hero_video_href`. Możesz zostawić puste."
                required: false

          - name: "sekcja_statystyki"
            label: "📊 Statystyki (liczby na stronie głównej)"
            widget: "object"
            collapsed: true
            fields:
              - name: "participants_count"
                label: "👥 Uczestnicy (tekst statystyki)"
                widget: "string"
                hint: "📍 Gdzie: strona główna → pasek statystyk. ⚠️ Użyj + na końcu dla przybliżeń. ✏️ Przykład: 250+"
                required: true
                default: "250+"
              - name: "countries_count"
                label: "🌐 Kraje (tekst statystyki)"
                widget: "string"
                hint: "📍 Gdzie: strona główna → pasek statystyk. ⚠️ Użyj + na końcu. ✏️ Przykład: 15+"
                required: true
                default: "15+"
              - name: "dogs_count"
                label: "🐕 Psy K9 (tekst)"
                widget: "string"
                hint: "📍 Gdzie: strona główna → pasek statystyk. ⚠️ Użyj + na końcu. ✏️ Przykład: 80+"
                required: true
                default: "80+"
              - name: "modules_count"
                label: "📚 Moduły (tekst)"
                widget: "string"
                hint: "📍 Gdzie: strona główna → pasek statystyk. ⚠️ Podaj dokładną liczbę. ✏️ Przykład: 8"
                required: true
                default: "8"
              - name: "participants_registered"
                label: "🔢 Zarejestrowani (liczba)"
                widget: "number"
                hint: "Opcjonalna liczba pod kampanie lub banery po podpięciu."
                required: false
                value_type: "int"
                min: 0
                max: 100000
                default: 0
              - name: "grants_approved"
                label: "💶 Zatwierdzone dotacje (liczba)"
                widget: "number"
                hint: "Opcjonalnie pod banery grantowe."
                required: false
                value_type: "int"
                min: 0
                default: 0
              - name: "volunteers_count"
                label: "🙋 Wolontariusze (liczba)"
                widget: "number"
                hint: "Liczba wolontariuszy po podpięciu UI."
                required: false
                value_type: "int"
                min: 0
                default: 0

          - name: "sekcja_wideo"
            label: "🎬 Wideo (strona główna + fallback galerii)"
            widget: "object"
            collapsed: true
            fields:
              - name: "main_video_youtube"
                label: "🎬 Główne wideo YouTube"
                widget: "string"
                hint: "Główny film w sekcji wideo na stronie głównej."
                required: false
                pattern:
                  - "^https?://.+$"
                  - "Wklej pełny adres URL z https://"
              - name: "main_video_title"
                label: "🎬 Tytuł głównego wideo"
                widget: "string"
                hint: "Tytuł przy odtwarzaczu głównym."
                required: false
              - name: "video_url_2"
                label: "🎬 Wideo 2 — URL"
                widget: "string"
                hint: "Drugi film w siatce wideo."
                required: false
                pattern:
                  - "^https?://.+$"
                  - "Wklej pełny adres URL z https://"
              - name: "video_badge_2"
                label: "🏷️ Wideo 2 — odznaka"
                widget: "string"
                hint: "Etykieta przy drugim filmie."
                required: false
              - name: "video_url_3"
                label: "🎬 Wideo 3 — URL"
                widget: "string"
                hint: "Trzeci film w siatce."
                required: false
                pattern:
                  - "^https?://.+$"
                  - "Wklej pełny adres URL z https://"
              - name: "video_badge_3"
                label: "🏷️ Wideo 3 — odznaka"
                widget: "string"
                hint: "Etykieta przy trzecim filmie."
                required: false
              - name: "video_url_4"
                label: "🎬 Wideo 4 — URL"
                widget: "string"
                hint: "Czwarty film (dolny rząd)."
                required: false
                pattern:
                  - "^https?://.+$"
                  - "Wklej pełny adres URL z https://"
              - name: "video_badge_4"
                label: "🏷️ Wideo 4 — odznaka"
                widget: "string"
                hint: "Etykieta przy czwartym filmie."
                required: false
              - name: "video_badge_1"
                label: "🏷️ Główne wideo — odznaka"
                widget: "string"
                hint: "Linia tekstu nad głównym odtwarzaczem."
                required: false
              - name: "gallery_video_1_title"
                label: "🎬 Galeria wideo 1 — tytuł"
                widget: "string"
                hint: "Tytuł pierwszego wideo w galerii."
                required: false
              - name: "gallery_video_1_url"
                label: "🎬 Galeria wideo 1 — URL"
                widget: "string"
                hint: "Link pierwszego wideo w galerii."
                required: false
                pattern:
                  - "^https?://.+$"
                  - "Wklej pełny adres URL z https://"
              - name: "gallery_video_1_badge"
                label: "🏷️ Galeria wideo 1 — odznaka"
                widget: "string"
                hint: "Etykieta przy pierwszym wideo."
                required: false
              - name: "gallery_video_2_title"
                label: "🎬 Galeria wideo 2 — tytuł"
                widget: "string"
                hint: "Tytuł drugiego wideo w galerii."
                required: false
              - name: "gallery_video_2_url"
                label: "🎬 Galeria wideo 2 — URL"
                widget: "string"
                hint: "Link drugiego wideo."
                required: false
                pattern:
                  - "^https?://.+$"
                  - "Wklej pełny adres URL z https://"
              - name: "gallery_video_2_badge"
                label: "🏷️ Galeria wideo 2 — odznaka"
                widget: "string"
                hint: "Etykieta przy drugim wideo."
                required: false
              - name: "gallery_video_3_title"
                label: "🎬 Galeria wideo 3 — tytuł"
                widget: "string"
                hint: "Tytuł trzeciego wideo."
                required: false
              - name: "gallery_video_3_url"
                label: "🎬 Galeria wideo 3 — URL"
                widget: "string"
                hint: "Link trzeciego wideo."
                required: false
                pattern:
                  - "^https?://.+$"
                  - "Wklej pełny adres URL z https://"
              - name: "gallery_video_3_badge"
                label: "🏷️ Galeria wideo 3 — odznaka"
                widget: "string"
                hint: "Etykieta przy trzecim wideo."
                required: false
              - name: "gallery_video_4_title"
                label: "🎬 Galeria wideo 4 — tytuł"
                widget: "string"
                hint: "Tytuł czwartego wideo."
                required: false
              - name: "gallery_video_4_url"
                label: "🎬 Galeria wideo 4 — URL"
                widget: "string"
                hint: "Link czwartego wideo."
                required: false
                pattern:
                  - "^https?://.+$"
                  - "Wklej pełny adres URL z https://"
              - name: "gallery_video_4_badge"
                label: "🏷️ Galeria wideo 4 — odznaka"
                widget: "string"
                hint: "Etykieta przy czwartym wideo."
                required: false

          - name: "sekcja_rejestracja"
            label: "🎟️ Rejestracja i partner CTA"
            widget: "object"
            collapsed: true
            fields:
              - name: "pretix_url"
