  - name: "registration_info"
    label: "📋 Rejestracja — Informacje Boczne"
    description: "Sidebar obok formularza Pretix: termin, miejsce, deadline, kontakt."
    files:
      - name: "registration_info"
        label: "📄 Informacje rejestracji"
        file: "src/content/registration_info.yml"
        format: "yaml"
        fields:
          - name: "reg_date_display"
            label: "📅 Wyświetlany termin"
            widget: "string"
            hint: "Tekst terminu w panelu obok formularza."
            required: true
          - name: "reg_prep_day"
            label: "📅 Dzień przygotowawczy"
            widget: "string"
            hint: "Opis dnia przygotowawczego w sidebarze."
            required: false
          - name: "reg_venues"
            label: "🏟️ Lokalizacje"
            widget: "string"
            hint: "Lista miejsc wydarzenia w panelu bocznym."
            required: true
          - name: "reg_city"
            label: "🏙️ Miasto"
            widget: "string"
            hint: "Miasto przy danych rejestracji."
            required: true
          - name: "reg_contact_email"
            label: "✉️ E-mail kontaktowy"
            widget: "string"
            pattern:
              - "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
              - "Wpisz poprawny adres e-mail"
            hint: "Kontakt przy pytaniach o zapisy."
            required: true
          - name: "reg_contact_phone"
            label: "📞 Telefon kontaktowy"
            widget: "string"
            hint: "Telefon przy pytaniach o zapisy."
            required: true
          - name: "reg_entry_text"
            label: "🎫 Tekst o wstępie"
            widget: "text"
            hint: "Opis wstępu / zasad udziału obok formularza."
            required: false
          - name: "reg_deadline_text"
            label: "⏳ Tekst deadline"
            widget: "string"
            hint: "Komunikat o końcu zapisów."
            required: false
          - name: "reg_limit_text"
            label: "⚠️ Tekst limitu miejsc"
            widget: "string"
            hint: "Ostrzeżenie o limitowanych miejscach."
            required: false
          - name: "sekcja_3_kroki_rejestracji"
            label: "🪜 Rejestracja — treść 3 kroków (PL)"
            widget: "object"
            collapsed: true
            hint: >
              📍 Gdzie: panel „JAK SIĘ ZAREJESTROWAĆ — 3 KROKI” na stronie /rejestracja.
              ⚠️ Ważne: pola dotyczą tylko wersji PL; inne języki korzystają z tłumaczeń/fallbacków.
              ✏️ Przykład: krótkie instrukcje krok po kroku dla formularza Pretix.
            fields:
              - name: "reg_step_1_pl"
                label: "1️⃣ Krok 1 — instrukcja"
                widget: "string"
                required: false
                default: "Wybierz bilet i kliknij „Zarejestruj\" / „Dalej\"."
                pattern: ['^.{0,180}$', "❌ Maksymalnie 180 znaków"]
                hint: >
                  📍 Gdzie: pierwszy wiersz listy 3 kroków na /rejestracja.
                  ⚠️ Ważne: max 180 znaków, zachowaj prosty język operacyjny.
                  ✏️ Przykład: Wybierz bilet i kliknij „Zarejestruj\" / „Dalej\".
              - name: "reg_step_2_pl"
                label: "2️⃣ Krok 2 — instrukcja"
                widget: "string"
                required: false
                default: "Finalizacja otworzy się w nowym oknie Pretix — zezwól na wyskakujące okna."
                pattern: ['^.{0,200}$', "❌ Maksymalnie 200 znaków"]
                hint: >
                  📍 Gdzie: drugi wiersz listy 3 kroków na /rejestracja.
                  ⚠️ Ważne: max 200 znaków. Wspomnij o nowym oknie/popup.
                  ✏️ Przykład: Finalizacja otworzy się w nowym oknie Pretix — zezwól na wyskakujące okna.
              - name: "reg_step_3_pl"
                label: "3️⃣ Krok 3 — instrukcja"
                widget: "string"
                required: false
                default: "Jeśli przyciski nie reagują, użyj linku „Otwórz pełny formularz\" pod widgetem."
                pattern: ['^.{0,220}$', "❌ Maksymalnie 220 znaków"]
                hint: >
                  📍 Gdzie: trzeci wiersz listy 3 kroków na /rejestracja.
                  ⚠️ Ważne: max 220 znaków. To krok awaryjny dla użytkownika.
                  ✏️ Przykład: Jeśli przyciski nie reagują, użyj linku „Otwórz pełny formularz\" pod widgetem.
