    create: true
    delete: true
    slug: "{{day}}-{{slug}}"
    preview_path: "/pl/o-wydarzeniu#agenda"
    extension: "md"
    format: "frontmatter"
    fields:
      - name: "day"
        label: "📅 Dzień (YYYY-MM-DD)"
        widget: "string"
        hint: >
          📍 Gdzie: grupowanie punktów na stronie /o-wydarzeniu w sekcji agendy.
          ✏️ Np. 2026-06-13.
        required: true
      - name: "time_start"
        label: "⏰ Godzina startu"
        widget: "string"
        hint: >
          📍 Gdzie: lewa krawędź bloku na osi czasu agendy.
          ✏️ Format 24h HH:MM.
        required: true
        pattern:
          - "^\\d{2}:\\d{2}$"
          - "Format HH:MM"
      - name: "time_end"
        label: "⏰ Godzina końca"
        widget: "string"
        hint: >
          📍 Gdzie: prawa krawędź bloku na osi czasu agendy.
          ✏️ Format 24h HH:MM.
        required: true
        pattern:
          - "^\\d{2}:\\d{2}$"
          - "Format HH:MM"
      - name: "title"
        label: "📝 Tytuł punktu"
        widget: "string"
        hint: >
          📍 Gdzie: nagłówek wiersza agendy i eksport kalendarza (ICS).
          ✏️ Np. Moduł K9 — podstawy.
        required: true
      - name: "category"
        label: "🏷️ Klucz kategorii"
        widget: "string"
        hint: >
          📍 Gdzie: kolor paska i filtr na /o-wydarzeniu — musi zgadzać się z kolekcją „Kategorie Agendy”.
          ✏️ Np. K9, TCCC, BREAK (dla przerw bez flagi is_break).
        required: true
        default: "K9"
      - name: "location"
        label: "📍 Lokalizacja"
        widget: "select"
        hint: >
          📍 Gdzie: miejsce przy punkcie programu w agendzie i w szczegółach wydarzenia.
          ✏️ Wybierz salę lub „—” gdy nie dotyczy.
        required: false
        default: "Arena Główna"
        options:
          - { label: "🏟️ Arena Główna", value: "Arena Główna" }
          - { label: "🏟️ 3MK Arena", value: "3MK Arena" }
          - { label: "🏫 Szkoła Mundurowa", value: "Szkoła Mundurowa" }
          - { label: "⚽ Stadion Miejski", value: "Stadion Miejski" }
          - { label: "🪑 Sala Konferencyjna", value: "Sala Konferencyjna" }
          - { label: "⛽ Infrastruktura Orlen", value: "Infrastruktura Orlen" }
          - { label: "➖ Nie dotyczy (—)", value: "—" }
      - name: "description"
        label: "📄 Opis (opcjonalnie)"
        widget: "text"
        hint: "📍 Gdzie: rozwinięcie / tooltip przy punkcie agendy na /o-wydarzeniu."
        required: false
      - name: "instructor"
        label: "👤 Instruktor / prowadzący"
        widget: "string"
        hint: "📍 Gdzie: opcjonalna linia „prowadzący” przy szczegółach punktu agendy."
        required: false
      - name: "locationMapUrl"
        label: "🔗 URL mapy (Google)"
        widget: "string"
        hint: >
          📍 Gdzie: przycisk „Nawiguj” przy punkcie programu w agendzie.
          ✏️ Wklej pełny adres z https:// — np. https://maps.app.goo.gl/...
        required: false
        pattern:
          - "^$|^https?://.*"
          - "Pozostaw puste lub wklej pełny adres z https://"
      - name: "is_break"
        label: "☕ To jest przerwa / lunch?"
        widget: boolean
        default: false
        hint: >
          true = punkt wyświetlany jak przerwa/lunch w agendzie (styl BREAK).
          false = zwykły blok programu (kolor wg pola category).
      - name: "order"
        label: "🔢 Kolejność wyświetlania"
        widget: "number"
        hint: "📍 Gdzie: kolejność w obrębie tego samego dnia na osi agendy — mniejsza = wyżej."
        required: false
        default: 99
        value_type: "int"
      - name: "active"
        label: "👁️ Widoczny na stronie"
        widget: "boolean"
        hint: "true = widoczny dla odwiedzających, false = ukryty. Wpis zostaje zapisany."
        required: false
        default: true
      - name: "needs_review"
        label: "⏳ Wymaga akceptacji przed publikacją"
        widget: "boolean"
        default: false
        hint: >
          true = wpis oczekuje na sprawdzenie przez redaktora naczelnego.
          false = wpis zaakceptowany i gotowy do publikacji.
          Użyj tego pola gdy nie jesteś pewien czy wpis jest gotowy.
