  # ─── AMBASADORZY ──────────────────────────────────────
  - name: "ambasadorzy"
    label: "🌍 Ambasadorzy"
    label_singular: "Ambasador"
    folder: "src/content/ambasadorzy"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{country}} ({{order}})"
    description: "Ambasadorzy CERBERUS K9 promujący wydarzenie w swoich krajach."
    preview_path: "/pl/ambasadorzy"
    media_folder: "public/uploads/ambasadorzy"
    public_folder: "/uploads/ambasadorzy"
    extension: "yml"
    format: "yaml"
    fields:
      - label: "👤 Imię i Nazwisko"
        name: "name"
        widget: "string"
        required: true
        hint: "📍 Gdzie: /ambasadorzy → karta ambasadora. ⚠️ Max 50 znaków. ✏️ Przykład: Jan Kowalski"
      - label: "🌍 Kraj"
        name: "country"
        widget: "string"
        required: true
        hint: "📍 Gdzie: /ambasadorzy → karta, przy fladze. ⚠️ Pełna nazwa po polsku. ✏️ Przykład: Czechy"
      - name: "country_code"
        label: "🏳️ Kod kraju (2 wielkie litery)"
        widget: "string"
        required: true
        pattern: ["^[A-Z]{2}$", "Wpisz dokładnie dwie wielkie litery"]
        hint: "📍 Gdzie: /ambasadorzy → flaga kraju. ⚠️ TYLKO 2 WIELKIE LITERY. PL=Polska, US=USA, DE=Niemcy. ✏️ Przykład: CZ"
      - label: "🎖️ Rola / Tytuł"
        name: "role_pl"
        widget: "string"
        required: false
        hint: "📍 Gdzie: /ambasadorzy → tekst pod imieniem (PL). ⚠️ Max 60 znaków. ✏️ Przykład: Były dowódca JW Komandosów"
      - label: "🎖️ Rola (EN)"
        name: "role_en"
        widget: "string"
        required: false
        hint: "📍 Gdzie: /ambasadorzy → tekst pod imieniem (EN). ⚠️ Max 60 znaków. ✏️ Przykład: Former Special Forces Commander"
      - label: "🏛️ Jednostka / Organizacja"
        name: "unit"
        widget: "string"
        required: false
        hint: "✏️ Np. Policja Krajowa Czechy"
      - name: "photo"
        label: "📸 Zdjęcie"
        widget: "image"
        required: false
        choose_url: true
        hint: "📍 Gdzie: /ambasadorzy → zdjęcie profilowe. ⚠️ Kwadrat 400x400px, WebP/JPG, max 200KB. squoosh.app. ✏️ Przykład: jan-kowalski.webp"
      - label: "📝 Krótkie bio"
        name: "bio_short_pl"
        widget: "text"
        required: false
        hint: "📍 Gdzie: /ambasadorzy → tekst na karcie (PL). ⚠️ Max 200 znaków — jedyny tekst widoczny bez klikania. ✏️ Przykład: Weteran JWK, doradca bezpieczeństwa K9."
      - name: "bio_short_en"
        widget: "text"
        required: false
        hint: "📍 Gdzie: /ambasadorzy → tekst na karcie (EN). ⚠️ Max 200 znaków. ✏️ Przykład: JWK veteran, K9 security advisor."
      - label: "💼 LinkedIn URL"
        name: "linkedin_url"
        widget: "string"
        required: false
        hint: "✏️ https://www.linkedin.com/in/..."
      - label: "📸 Instagram URL"
        name: "social_instagram"
        widget: "string"
        required: false
        hint: "✏️ https://www.instagram.com/..."
      - label: "🔢 Kolejność"
        name: "order"
        widget: "number"
        default: 99
        hint: "📍 Gdzie: /ambasadorzy → kolejność na liście. ⚠️ Mniejsza liczba = wyżej. ✏️ Przykład: 10, 20, 30"
      - label: "👁️ Widoczny"
        name: "isVisible"
        widget: "boolean"
        default: true
        hint: "📍 Gdzie: /ambasadorzy → czy ambasador widoczny. ⚠️ NIE = ukryty bez usuwania. ✏️ TAK = widoczny"
      - label: "⏳ Wymaga akceptacji"
        name: "needs_review"
        widget: "boolean"
        default: false
        hint: "true = oczekuje sprawdzenia, false = zaakceptowany."
      - name: "social_facebook"
        label: "Facebook URL"
        widget: "string"
        required: false
      - name: "tags"
        label: "Tagi"
        widget: "list"
        required: false

  # ─── CERTYFIKATY ──────────────────────────────────────
  - name: "certyfikaty"
    label: "Certyfikaty"
    label_singular: "Certyfikat"
    description: "Certyfikaty uczestnik?w szkole? i modu??w CERBERUS K9."
    folder: "src/content/certyfikaty"
    create: true
    delete: false
    slug: "{{certificate_id}}"
    identifier_field: "certificate_id"
    summary: "{{participant_name}} ? {{module}} ({{issue_date}})"
    media_folder: "public/uploads/certyfikaty/"
    public_folder: "/uploads/certyfikaty/"
    extension: "yml"
    format: "yaml"
    fields:
      - { name: "certificate_id", label: "ID certyfikatu", widget: "string", hint: "📍 Gdzie: /certyfikat/[id] → unikalny identyfikator certyfikatu. ⚠️ Bez spacji, unikalne. ✏️ Przykład: CK9-2026-001" }
      - { name: "participant_name", label: "Imi? i nazwisko uczestnika", widget: "string", hint: "📍 Gdzie: /certyfikat/[id] → imię na certyfikacie. ⚠️ Pełne imię i nazwisko. ✏️ Przykład: Jan Kowalski" }
      - { name: "participant_email", label: "E-mail uczestnika", widget: "string", pattern: ["^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$", "Wpisz poprawny adres e-mail"], hint: "📍 Gdzie: wysyłka certyfikatu e-mailem. ⚠️ Poprawny format email. ✏️ Przykład: jan@example.com" }
      - name: "module"
        label: "Modu?"
        widget: "select"
        options: ["K9-Gryzienie","K9-Detekcja","K9-SAR","TCCC","Drony","HARDEST HIT","Konferencja","BREAK","CEREMONIA","Inne"]
        hint: "📍 Gdzie: /certyfikat/[id] → moduł na certyfikacie. ⚠️ Wybierz z listy — musi być dokładna nazwa. ✏️ Przykład: K9-Gryzienie"
      - { name: "issue_date", label: "Data wystawienia", widget: "datetime", format: "YYYY-MM-DD", dateFormat: true, timeFormat: false, hint: "📍 Gdzie: /certyfikat/[id] → data wystawienia. ⚠️ Format RRRR-MM-DD. ✏️ Przykład: 2026-06-14" }
      - { name: "valid_until", label: "Wa?ny do", widget: "datetime", required: false, format: "YYYY-MM-DD", dateFormat: true, timeFormat: false, hint: "Opcjonalna data wa?no?ci, np. 2027-06-14." }
      - { name: "instructor_name", label: "Instruktor", widget: "string", required: false, hint: "Osoba podpisuj?ca certyfikat, np. mjr Adam Nowak." }
      - { name: "signature_url", label: "URL podpisu", widget: "string", required: false, pattern: ["^https?://.+$", "URL musi zaczyna? si? od https://"], hint: "Link do grafiki podpisu, np. https://cdn.example.com/signature.png." }
      - { name: "qr_data", label: "Dane QR", widget: "string", hint: "📍 Gdzie: /certyfikat/[id] → kod QR na certyfikacie. ⚠️ Pełny URL do certyfikatu. ✏️ Przykład: https://cerberusk9.org/certyfikat/CK9-2026-001" }
  - name: "szkolenia"
    label: "Szkolenia"
    label_singular: "Szkolenie"
    description: "Oferta szkole? i kurs?w zwi?zanych z CERBERUS K9."
    folder: "src/content/szkolenia"
    create: true
    delete: false
    slug: "{{slug}}"
    identifier_field: "title_pl"
    summary: "{{title_pl}} ? {{category}}"
    media_folder: "public/uploads/szkolenia/"
    public_folder: "/uploads/szkolenia/"
    extension: "yml"
    format: "yaml"
    fields:
      - { name: "title_pl", label: "Tytu? (PL)", widget: "string", hint: "📍 Gdzie: /szkolenia → tytuł karty szkolenia (PL). ⚠️ Max 60 znaków. ✏️ Przykład: Kurs TCCC Podstawowy" }
      - { name: "title_en", label: "Tytu? (EN)", widget: "string", hint: "📍 Gdzie: /szkolenia → tytuł karty szkolenia (EN). ⚠️ Max 60 znaków. ✏️ Przykład: Basic TCCC Course" }
      - name: "category"
        label: "Kategoria"
        widget: "select"
        options: ["K9-Gryzienie","K9-Detekcja","K9-SAR","TCCC","Drony","HARDEST HIT","Konferencja","BREAK","CEREMONIA","Inne"]
        hint: "📍 Gdzie: /szkolenia → badge kategorii. ⚠️ Wybierz z listy. ✏️ Przykład: TCCC"
      - { name: "description_pl", label: "Opis (PL)", widget: "text", hint: "📍 Gdzie: /szkolenia → opis pod tytułem (PL). ⚠️ 2-4 zdania. ✏️ Przykład: Dwudniowe szkolenie z podstaw TCCC dla służb." }
      - { name: "description_en", label: "Opis (EN)", widget: "text", hint: "📍 Gdzie: /szkolenia → opis pod tytułem (EN). ⚠️ 2-4 zdania. ✏️ Przykład: Two-day basic TCCC course for services." }
      - { name: "instructor_id", label: "ID instruktora", widget: "string", required: false, hint: "Slug z kolekcji instruktorzy." }
      - { name: "price_pln", label: "Cena (PLN)", widget: "number", required: false, hint: "📍 Gdzie: /szkolenia → cena na karcie. ⚠️ Liczba w PLN bez symbolu. Zostaw puste jeśli bezpłatne. ✏️ Przykład: 890" }
      - { name: "max_participants", label: "Max uczestnik?w", widget: "number", hint: "📍 Gdzie: /szkolenia → limit uczestników. ⚠️ Liczba całkowita. ✏️ Przykład: 12" }
