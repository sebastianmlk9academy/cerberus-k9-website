    public_folder: "/uploads/faq/"
    fields:
      - { name: "question_pl", label: "Pytanie (PL)", widget: "string", hint: "📍 Gdzie: /o-wydarzeniu → sekcja FAQ, pytanie. ⚠️ Max 100 znaków. Pisz tak jak zapytałby uczestnik. ✏️ Przykład: Czy udział w wydarzeniu jest bezpłatny?" }
      - { name: "answer_pl", label: "Odpowied? (PL)", widget: "text", hint: "📍 Gdzie: /o-wydarzeniu → odpowiedź po rozwinięciu. ⚠️ Max 300 znaków. Konkretna, bez zbędnych słów. ✏️ Przykład: Tak, wstęp jest całkowicie bezpłatny. Wymagana jest wcześniejsza rejestracja przez formularz Pretix." }
      - { name: "question_en", label: "Pytanie (EN)", widget: "string", required: false }
      - { name: "answer_en", label: "Odpowied? (EN)", widget: "text", required: false }
      - { name: "lang", label: "J?zyk", widget: "select", options: ["pl","en"], default: "pl" }
      - { name: "category", label: "Kategoria", widget: "select", required: false, default: "Inne", options: ["Rejestracja","Program","Logistyka","K9","TCCC","Drony","HARDEST HIT","Inne"], hint: "📍 Gdzie: /o-wydarzeniu → grupowanie pytań. ⚠️ Wybierz kategorię tematyczną. ✏️ Rejestracja=pytania o zapisy, Logistyka=dojazd/nocleg, Program=harmonogram" }
      - { name: "order", label: "Kolejno??", widget: "number", required: false, default: 99, hint: "📍 Gdzie: /o-wydarzeniu → kolejność pytań w FAQ. ⚠️ Mniejsza liczba = wyżej. Ważniejsze pytania daj niżej (1-10). ✏️ Przykład: 10, 20, 30" }
      - { name: "active", label: "Aktywne", widget: "boolean", required: false, default: true }
