  - name: instructor_filters
    label: "🎯 Filtry Instruktorów (CMS)"
    label_singular: "Filtr"
    folder: src/content/instructor_filters
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: key
    summary: "{{label_pl}} — {{filter_field}}/{{filter_match}} ({{order}})"
    extension: yml
    format: yaml
    fields:
      - { name: key, label: "🔑 Klucz", widget: string, required: true }
      - { name: label_pl, label: "🇵🇱 Etykieta PL", widget: string, required: true }
      - { name: label_en, label: "🇬🇧 Etykieta EN", widget: string, required: false }
      - { name: label_de, label: "🇩🇪 Etykieta DE", widget: string, required: false }
      - { name: label_fr, label: "🇫🇷 Etykieta FR", widget: string, required: false }
      - name: filter_field
        label: "Pole do filtrowania"
        widget: select
        default: specializations
        hint: "📍 Decyduje po jakim polu instruktora działa filtr. ⚠️ Wybierz specializations dla większości filtrów. ✏️ Przykład: specializations"
        options:
          - { label: "Specjalizacje (specializations)", value: specializations }
          - { label: "Typ instruktora (type)", value: type }
          - { label: "Moduł (module)", value: module }
          - { label: "Języki (languages)", value: languages }
          - { label: "Wszyscy (all)", value: all }
      - name: filter_match
        label: "Sposób dopasowania"
        widget: select
        default: includes
        hint: "📍 includes = specjalizacja zawiera szukaną wartość. ✏️ Przykład: includes"
        options:
          - { label: "Zawiera (includes)", value: includes }
          - { label: "Równa się (equals)", value: equals }
          - { label: "Jeden z (any_of)", value: any_of }
          - { label: "Wszyscy (none)", value: none }
      - name: filter_value
        label: "Wartość filtra (jedna)"
        widget: relation
        collection: instruktorzy
        search_fields: ["specializations"]
        value_field: specializations
        display_fields: ["name", "specializations"]
        required: false
        hint: "📍 Wybierz wartość z listy instruktorów. Pole aktualizuje się automatycznie gdy dodasz nowego instruktora. ✏️ Przykład: K9-Gryzienie"
      - name: filter_values
        label: "Wartości filtra (lista — any_of)"
        widget: relation
        collection: instruktorzy
        search_fields: ["specializations", "name"]
        value_field: specializations
        display_fields: ["name", "specializations"]
        multiple: true
        required: false
        hint: "📍 Wiele wpisów instruktorów — specjalizacje są scalane do listy any_of. Aktualizuje się z kolekcji instruktorzy."
      - name: order
        label: "🔢 Kolejność"
        widget: number
        value_type: int
        default: 10
        hint: "📍 Gdzie: kolejność przycisków filtrów na /instruktorzy — mniejsza = wcześniej."
      - name: active
        label: "👁️ Filtr aktywny"
        widget: boolean
        default: true
        hint: "true = filtr widoczny na stronie, false = ukryty w UI (wpis zostaje w repozytorium)."
