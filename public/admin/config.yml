  - name: "blog"
    label: "📝 Blog (legacy)"
    description: "Stara kolekcja bloga Astro — rzadko używana; wpisy w src/content/blog."
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}} — {{pubDate}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - name: "title"
        label: "📝 Tytuł"
        widget: "string"
        hint: "Tytuł wpisu blogowego."
        required: true
      - name: "description"
        label: "📄 Opis"
        widget: "text"
        hint: "Krótki opis wpisu."
        required: true
      - name: "pubDate"
        label: "📅 Data publikacji"
        widget: "datetime"
        hint: "Data publikacji wpisu."
        required: true
      - name: "updatedDate"
        label: "📅 Data aktualizacji"
        widget: "datetime"
        hint: "Opcjonalna data ostatniej zmiany."
        required: false
      - name: "draft"
        label: "📝 Szkic"
        widget: "boolean"
        hint: "true = widoczny dla odwiedzających, false = ukryty. Wpis zostaje zapisany."
        required: false
        default: false

  # ─── AMBASADORZY ──────────────────────────────────────
  - name: "ambasadorzy"
    label: "🌍 Ambasadorzy"
    label_singular: "Ambasador"
    folder: "src/content/ambasadorzy"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{country}} ({{order}})"
    description: "Ambasadorzy CERBERUS K9 promujący wydarzenie w swoich krajach."
    preview_path: "/pl/ambasadorzy"
    media_folder: "public/uploads/ambasadorzy"
    public_folder: "/uploads/ambasadorzy"
    fields:
      - label: "👤 Imię i Nazwisko"
        name: "name"
        widget: "string"
        required: true
        hint: "📍 Karta ambasadora na stronie /ambasadorzy."
      - label: "🌍 Kraj"
        name: "country"
        widget: "string"
        required: true
        hint: "✏️ Np. Portugalia, Czechy, USA"
      - name: "country_code"
        label: "🏳️ Kod kraju (2 wielkie litery)"
        widget: "string"
        required: true
        pattern: ["^[A-Z]{2}$", "Wpisz dokładnie dwie wielkie litery"]
        hint: "📍 Flaga kraju. PL=Polska, US=USA, DE=Niemcy, PT=Portugalia"
      - label: "🎖️ Rola / Tytuł"
        name: "role_pl"
        widget: "string"
        required: false
        hint: "Krótko po polsku, np. 'Były dowódca JW Komandosów'"
      - label: "🎖️ Rola (EN)"
        name: "role_en"
        widget: "string"
        required: false
      - label: "🏛️ Jednostka / Organizacja"
        name: "unit"
        widget: "string"
        required: false
        hint: "✏️ Np. Policja Krajowa Czechy"
      - name: "photo"
        label: "📸 Zdjęcie"
        widget: "image"
        required: false
        choose_url: true
        hint: "⚠️ Format: WebP, 400x400px (kwadrat), max 200KB."
      - label: "📝 Krótkie bio"
        name: "bio_short_pl"
        widget: "text"
        required: false
        hint: "1-2 zdania, max 200 znaków"
      - name: "bio_short_en"
        widget: "text"
        required: false
      - label: "💼 LinkedIn URL"
        name: "linkedin_url"
        widget: "string"
        required: false
        hint: "✏️ https://www.linkedin.com/in/..."
      - label: "📸 Instagram URL"
        name: "social_instagram"
        widget: "string"
        required: false
        hint: "✏️ https://www.instagram.com/..."
      - label: "🔢 Kolejność"
        name: "order"
        widget: "number"
        default: 99
        hint: "Niższa liczba = wyżej. 1 = pierwszy."
      - label: "👁️ Widoczny"
        name: "isVisible"
        widget: "boolean"
        default: true
        hint: "true = widoczny, false = ukryty bez usuwania."
      - label: "⏳ Wymaga akceptacji"
        name: "needs_review"
        widget: "boolean"
        default: false
        hint: "true = oczekuje sprawdzenia, false = zaakceptowany."
      - name: "social_facebook"
        label: "Facebook URL"
        widget: "string"
        required: false
      - name: "tags"
        label: "Tagi"
        widget: "list"
        required: false

  # ─── CERTYFIKATY ──────────────────────────────────────
  - name: "certyfikaty"
    label: "Certyfikaty"
    label_singular: "Certyfikat"
    description: "Certyfikaty uczestnik?w szkole? i modu??w CERBERUS K9."
    folder: "src/content/certyfikaty"
    create: true
    delete: false
    slug: "{{certificate_id}}"
    identifier_field: "certificate_id"
    summary: "{{participant_name}} ? {{module}} ({{issue_date}})"
    media_folder: "public/uploads/certyfikaty/"
    public_folder: "/uploads/certyfikaty/"
    fields:
      - { name: "certificate_id", label: "ID certyfikatu", widget: "string", hint: "Unikalny identyfikator, np. CK9-2026-001." }
      - { name: "participant_name", label: "Imi? i nazwisko uczestnika", widget: "string", hint: "Pe?ne imi? i nazwisko, np. Jan Kowalski." }
      - { name: "participant_email", label: "E-mail uczestnika", widget: "string", pattern: ["^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$", "Wpisz poprawny adres e-mail"], hint: "Adres e-mail uczestnika, np. jan.kowalski@example.com." }
      - name: "module"
        label: "Modu?"
        widget: "select"
        options: ["K9-Gryzienie","K9-Detekcja","K9-SAR","TCCC","Drony","HARDEST HIT","Konferencja","BREAK","CEREMONIA","Inne"]
        hint: "Wybierz modu? szkoleniowy."
      - { name: "issue_date", label: "Data wystawienia", widget: "datetime", format: "YYYY-MM-DD", dateFormat: true, timeFormat: false, hint: "Data wystawienia certyfikatu, np. 2026-06-14." }
      - { name: "valid_until", label: "Wa?ny do", widget: "datetime", required: false, format: "YYYY-MM-DD", dateFormat: true, timeFormat: false, hint: "Opcjonalna data wa?no?ci, np. 2027-06-14." }
      - { name: "instructor_name", label: "Instruktor", widget: "string", required: false, hint: "Osoba podpisuj?ca certyfikat, np. mjr Adam Nowak." }
