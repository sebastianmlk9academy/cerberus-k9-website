name: Deploy to OVH

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      # OVH mutualized hosting: prefer explicit FTP over TLS (port 21). Plain FTP often fails
      # from cloud IPs or is disabled; SFTP (SSH port 22) needs a different action if FTPS fails.
      - name: Deploy to OVH via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          timeout: 120000
          local-dir: ./dist/
          server-dir: /www/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Notify deploy success
        if: success()
        run: echo "Deploy successful"

      - name: Notify deploy failure
        if: failure()
        run: |
          echo "Deploy failed"
          exit 1
