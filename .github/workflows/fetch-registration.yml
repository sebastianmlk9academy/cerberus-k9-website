name: Fetch Registration Count
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch count
        env:
          PRETIX_API_TOKEN: ${{ secrets.PRETIX_API_TOKEN }}
        run: node scripts/fetch-registration-count.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/registration-count.json
          git diff --staged --quiet || git commit -m "chore: update registration count"
          git push
