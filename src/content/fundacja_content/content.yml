mission_pl: |
  Fundacja Pacta K9 oraz Międzynarodowa Platforma Obrony CERBERUS K9 integrują służby mundurowe i sektor
  cywilny poprzez zunifikowany system szkoleniowy, który standaryzuje kompetencje, wzmacnia współpracę
  cywilno-wojskową na poziomie krajowym i w ramach NATO oraz przygotowuje obywateli do skutecznego
  działania w warunkach zagrożeń i sytuacji kryzysowych.
mission_en: |
  The PACTA K9 Foundation and the CERBERUS K9 International Defence Platform connect uniformed services
  and the civilian sector through a unified training system that standardises skills, strengthens
  civil–military cooperation nationally and within NATO, and prepares citizens to act effectively under
  threat and in crisis situations.
vision_pl: |
  Największa w Polsce i jedna z wiodących w NATO zintegrowana platforma bezpieczeństwa — łącząca służby
  mundurowe, struktury obrony cywilnej i sektor prywatny w jeden spójny ekosystem gotowości operacyjnej.
  Budujemy odporność społeczeństwa nie poprzez deklaracje, lecz poprzez weryfikowalne kompetencje —
  szkoląc, sprawdzając i certyfikując obywateli zdolnych do działania w warunkach kryzysu, konfliktu i
  zagrożeń hybrydowych. Dostarczamy służbom mundurowym kandydatów przygotowanych mentalnie i
  proceduralnie, gotowych do służby od pierwszego dnia.
vision_en: |
  To be Poland’s largest and one of NATO’s leading integrated security platforms — combining uniformed
  services, civil defence structures, and the private sector into one coherent ecosystem of operational
  readiness. We build societal resilience not through declarations alone, but through verifiable
  competence — training, assessing, and certifying citizens able to operate in crisis, conflict, and
  hybrid-threat conditions. We deliver to uniformed services candidates who are mentally and
  procedurally prepared to serve from day one.
goals_pl:
  - goal: Edukacja dzieci, młodzieży i dorosłych w zakresie bezpieczeństwa publicznego, reagowania kryzysowego oraz odpowiedzialnej pracy z psem.
  - goal: Organizowanie i prowadzenie szkoleń z zakresu szkolenia psów, pracy z psami oraz przygotowania opiekunów i przyszłych instruktorów.
  - goal: Organizowanie szkoleń, seminariów i warsztatów dla osób pracujących z psami.
  - goal: Organizowanie zawodów, imprez sportowych i wydarzeń, których motywem przewodnim jest pies, obronność i bezpieczeństwo.
  - goal: Organizowanie campów, obozów szkoleniowych, spotkań integracyjnych i wydarzeń rodzinnych dla ludzi z psami.
  - goal: Prowadzenie działań na rzecz osób z niepełnosprawnościami, z udziałem psów lub bez ich udziału, w szczególności poprzez szkolenia, zajęcia, pokazy, eventy oraz działania aktywizacyjne i rehabilitacyjne.
  - goal: Tworzenie, prowadzenie i rozwijanie infrastruktury sportowej, rekreacyjnej i szkoleniowej dostępnej dla osób z niepełnosprawnościami, w tym torów sportowych, obiektów treningowych i terenów rekreacyjnych.
  - goal: Prowadzenie działań na rzecz schronisk dla zwierząt oraz psów bezdomnych, w szczególności w zakresie ich szkolenia, socjalizacji, rehabilitacji oraz przygotowania do adopcji.
  - goal: Promowanie humanitarnego traktowania zwierząt oraz odpowiedzialnej adopcji.
  - goal: Wspieranie weteranów, instruktorów i osób działających na rzecz bezpieczeństwa publicznego.
  - goal: Wspieranie współpracy krajowej i międzynarodowej środowisk K9.
goals_en:
  - goal: Education of children, youth, and adults in public safety, crisis response, and responsible work with dogs.
  - goal: Organising and running training in dog training, working with dogs, and preparing handlers and future instructors.
  - goal: Organising training courses, seminars, and workshops for people who work with dogs.
  - goal: Organising competitions, sporting events, and gatherings focused on dogs, protection, and security.
  - goal: Organising camps, training camps, integration meetings, and family events for people with dogs.
  - goal: Activities for people with disabilities, with or without dogs, including training, classes, demonstrations, events, and activation or rehabilitation programmes.
  - goal: Creating, operating, and developing sports, recreational, and training infrastructure accessible to people with disabilities, including sports tracks, training facilities, and recreational areas.
  - goal: Activities for animal shelters and homeless dogs, especially training, socialisation, rehabilitation, and adoption readiness.
  - goal: Promoting humane treatment of animals and responsible adoption.
  - goal: Supporting veterans, instructors, and people working for public safety.
  - goal: Supporting national and international cooperation within K9 communities.
