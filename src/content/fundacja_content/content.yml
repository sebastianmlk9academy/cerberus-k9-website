about_body_p1_pl: "CERBERUS K9 to największa w Polsce i jedna z największych w regionie NATO bezpłatna platforma wymiany wiedzy i doświadczeń w zakresie kynologii, bezpieczeństwa publicznego i obronności. Wydarzenie łączy profesjonalne służby mundurowe z cywilami, instruktorów z całego świata z polskimi specjalistami, teorię z intensywną praktyką."
about_body_p2_pl: "W 2025 roku zebraliśmy ponad 150 uczestników z 7 krajów — policję, wojsko, straż, organizacje proobronne i cywilnych przewodników psów. W 2026 roku wychodzimy na poziom europejski: potwierdzony udział US Police K9 SWAT, Marynarka Wojenna Portugalii i 15+ delegacji z krajów NATO."
