items:
  - title_en: "Official Accreditation"
    title_pl: "Oficjalna Akredytacja"
    body_en: "Dedicated accreditation process for military and law enforcement delegations."
    body_pl: "Dedykowany proces akredytacji dla delegacji wojskowych i służb mundurowych."
  - title_en: "Interpreter Support"
    title_pl: "Wsparcie Tłumaczy"
    body_en: "English-speaking staff available. PL/EN/DE simultaneous interpretation on request."
    body_pl: "Personel anglojęzyczny na miejscu. Tłumaczenie PL/EN/DE na życzenie."
  - title_en: "Transport Coordination"
    title_pl: "Koordynacja Transportu"
    body_en: "Assistance with transport from Poznań, Wrocław and Warsaw airports."
    body_pl: "Pomoc w organizacji transportu z lotnisk w Poznaniu, Wrocławiu i Warszawie."
  - title_en: "Accommodation"
    title_pl: "Zakwaterowanie"
    body_en: "Partner hotel list with preferential rates for delegations of 3+ persons."
    body_pl: "Lista hoteli partnerskich z cenami preferencyjnymi dla delegacji 3+ osób."
  - title_en: "Dedicated Programme"
    title_pl: "Dedykowany Program"
    body_en: "Closed briefings and demonstrations not available to general public."
    body_pl: "Zamknięte briefingi i pokazy niedostępne dla ogółu uczestników."
  - title_en: "Networking"
    title_pl: "Networking"
    body_en: "Direct contact with instructors, Polish services representatives and NATO partners."
    body_pl: "Bezpośredni kontakt z instruktorami, przedstawicielami polskich służb i partnerami NATO."
